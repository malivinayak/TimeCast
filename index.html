<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TIMECAST</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#05060a;color:#dfeaff;font-family:"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;-webkit-font-smoothing:antialiased}
  #gc{display:block;width:100vw;height:100vh;cursor:none;image-rendering:auto}
  #vignette{position:fixed;inset:0;pointer-events:none;z-index:5;
    background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%);
    mix-blend-mode:multiply}
  #scanlines{position:fixed;inset:0;pointer-events:none;z-index:6;opacity:.10;
    background:repeating-linear-gradient(0deg,rgba(255,255,255,0.06) 0 1px,transparent 1px 3px)}
  #grain{position:fixed;inset:0;pointer-events:none;z-index:7;opacity:.05;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='2.2' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.7'/></svg>")}
  #hud{position:fixed;inset:0;pointer-events:none;z-index:10;color:#e6f0ff;font-size:12px;letter-spacing:.18em}
  .panel{position:absolute;padding:14px 18px;background:linear-gradient(180deg,rgba(8,12,22,0.78),rgba(8,12,22,0.55));
    border:1px solid rgba(120,200,255,0.18);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
  .panel:before{content:"";position:absolute;left:-1px;top:-1px;width:10px;height:10px;border-top:1px solid #6df;border-left:1px solid #6df}
  .panel:after{content:"";position:absolute;right:-1px;bottom:-1px;width:10px;height:10px;border-bottom:1px solid #6df;border-right:1px solid #6df}
  #tl{top:20px;left:20px;min-width:240px}
  #tl .lbl{color:#6ad6ff;font-size:10px;opacity:.7}
  #tl .val{font-size:22px;margin-top:4px;color:#fff;letter-spacing:.05em}
  #tl .sub{font-size:10px;opacity:.6;margin-top:2px}
  #tr{top:20px;right:20px;text-align:right;min-width:180px}
  #tr .timebar{height:6px;background:rgba(120,200,255,.12);margin-top:8px;position:relative;overflow:hidden}
  #tr .timebar i{display:block;height:100%;width:2%;background:linear-gradient(90deg,#39f,#9cf,#fff);transition:width .12s linear;box-shadow:0 0 12px #6cf}
  #bl{bottom:20px;left:20px}
  #bl .ammo{display:flex;gap:4px;margin-top:6px}
  #bl .ammo b{width:10px;height:18px;background:#6df;box-shadow:0 0 6px #6cf;display:block}
  #bl .ammo b.spent{background:#222a3a;box-shadow:none}
  #bl .ammo b.reloading{background:#fa3;box-shadow:0 0 6px #fa3;animation:pulse .6s infinite alternate}
  @keyframes pulse{from{opacity:.4}to{opacity:1}}
  #bl .hp{display:flex;gap:6px;margin-top:8px}
  #bl .hp b{width:18px;height:6px;background:#f55;box-shadow:0 0 6px #f55}
  #bl .hp b.lost{background:#2a1820;box-shadow:none}
  #br{bottom:20px;right:20px;text-align:right}
  #combo{position:fixed;top:18%;right:8%;font-size:54px;color:#fff;text-align:right;z-index:10;
    text-shadow:0 0 24px rgba(255,210,80,0.7);font-weight:300;opacity:0;transition:opacity .25s;pointer-events:none;letter-spacing:.04em}
  #combo .x{font-size:80px;color:#ffd25a;text-shadow:0 0 32px rgba(255,200,80,0.9)}
  #combo .tag{font-size:11px;color:#ffe;letter-spacing:.3em;opacity:.8}
  #centermsg{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;pointer-events:none;text-align:center}
  #centermsg .name{font-size:78px;letter-spacing:.32em;color:#fff;font-weight:200;text-shadow:0 0 40px rgba(120,200,255,.6)}
  #centermsg .sub{font-size:13px;letter-spacing:.5em;color:#6df;margin-top:18px;opacity:.85}
  #centermsg .hint{font-size:11px;letter-spacing:.4em;color:#fff;margin-top:38px;opacity:.6}
  #menu{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30;pointer-events:auto;background:radial-gradient(ellipse at center,rgba(10,16,28,0.0) 0%, rgba(2,4,8,0.6) 70%)}
  #menu .title{font-size:120px;letter-spacing:.34em;color:#fff;font-weight:200;text-shadow:0 0 60px rgba(120,200,255,0.6),0 0 8px #fff}
  #menu .title em{font-style:normal;color:#6df}
  #menu .tag{font-size:13px;letter-spacing:.6em;color:#6df;margin-top:18px}
  #menu .ctrls{margin-top:60px;display:grid;grid-template-columns:auto auto;gap:8px 22px;font-size:11px;letter-spacing:.18em;color:#bcd;opacity:.85}
  #menu .ctrls b{color:#fff;font-weight:400}
  #menu .start{margin-top:50px;padding:14px 36px;border:1px solid #6df;color:#fff;letter-spacing:.4em;font-size:14px;
    background:transparent;cursor:pointer;font-family:inherit;animation:breathe 2.2s ease-in-out infinite}
  #menu .start:hover{background:rgba(100,200,255,.08);box-shadow:0 0 24px rgba(100,200,255,.25)}
  @keyframes breathe{0%,100%{box-shadow:0 0 0 rgba(100,200,255,0)}50%{box-shadow:0 0 22px rgba(100,200,255,.4)}}
  #menu .note{position:absolute;bottom:30px;font-size:10px;letter-spacing:.4em;color:#46587a}
  .hidden{display:none !important}
  .fadeout{animation:fade .6s ease forwards}
  @keyframes fade{to{opacity:0;transform:translateY(-12px)}}
  #flash{position:fixed;inset:0;pointer-events:none;z-index:8;background:#fff;opacity:0}
  #freeze{position:fixed;inset:0;pointer-events:none;z-index:9;background:rgba(0,200,255,0.0);mix-blend-mode:screen}
  #cursor{position:fixed;width:46px;height:46px;pointer-events:none;z-index:11;transform:translate(-50%,-50%);
    mix-blend-mode:screen}
</style>
</head>
<body>
<canvas id="gc"></canvas>

<div id="vignette"></div>
<div id="scanlines"></div>
<div id="grain"></div>
<div id="flash"></div>
<div id="freeze"></div>

<div id="hud">
  <div id="tl" class="panel">
    <div class="lbl">// WAVE</div>
    <div class="val" id="wave">01</div>
    <div class="sub" id="wavename">INITIATION</div>
  </div>
  <div id="tr" class="panel">
    <div class="lbl">// TIMEFLOW</div>
    <div class="val" id="ts">02%</div>
    <div class="timebar"><i id="tsbar"></i></div>
    <div class="sub" id="echo" style="margin-top:8px">ECHO · READY</div>
  </div>
  <div id="bl" class="panel">
    <div class="lbl">// VITALS</div>
    <div class="hp" id="hp"></div>
    <div class="lbl" style="margin-top:10px">// CHAMBER</div>
    <div class="ammo" id="ammo"></div>
  </div>
  <div id="br" class="panel">
    <div class="lbl">// THREATS</div>
    <div class="val" id="threats">0</div>
    <div class="sub" id="kills">KILLS · 0</div>
  </div>
</div>

<div id="combo"><span class="tag">CHAIN</span><br><span class="x">×0</span></div>

<div id="centermsg" class="hidden">
  <div class="name" id="cmname">WAVE 01</div>
  <div class="sub" id="cmsub">INITIATION</div>
  <div class="hint" id="cmhint">TIME MOVES WHEN YOU MOVE</div>
</div>

<svg id="cursor" viewBox="0 0 46 46">
  <circle cx="23" cy="23" r="14" fill="none" stroke="#6df" stroke-width="1.2" opacity=".85"/>
  <circle cx="23" cy="23" r="2" fill="#6df"/>
  <line x1="23" y1="2" x2="23" y2="10" stroke="#6df" stroke-width="1.4"/>
  <line x1="23" y1="36" x2="23" y2="44" stroke="#6df" stroke-width="1.4"/>
  <line x1="2" y1="23" x2="10" y2="23" stroke="#6df" stroke-width="1.4"/>
  <line x1="36" y1="23" x2="44" y2="23" stroke="#6df" stroke-width="1.4"/>
</svg>

<div id="menu">
  <div class="title">TIME<em>·</em>CAST</div>
  <div class="tag">TIME MOVES ONLY WHEN YOU MOVE</div>
  <div class="ctrls">
    <b>WASD</b><span>MOVE</span>
    <b>MOUSE</b><span>AIM</span>
    <b>LEFT CLICK</b><span>FIRE</span>
    <b>SHIFT</b><span>DASH</span>
    <b>SPACE</b><span>RELEASE TIME ECHO</span>
    <b>R</b><span>RESTART</span>
  </div>
  <button class="start" id="startbtn">ENGAGE</button>
  <div class="note">A CINEMATIC TIME-ACTION DEMO</div>
</div>

<script>
/* =============================================================================
   TIMECAST — cinematic time-action arena
   Core rule: time advances ONLY while the player is moving / aiming / acting.
   ========================================================================== */

const cv = document.getElementById('gc');
const ctx = cv.getContext('2d', { alpha: false });
function resize(){ cv.width = innerWidth; cv.height = innerHeight; }
addEventListener('resize', resize); resize();

const TAU = Math.PI * 2;
const rnd = (a=1,b)=> b===undefined ? Math.random()*a : a + Math.random()*(b-a);
const lerp = (a,b,t)=> a + (b-a)*t;
const clamp = (v,a,b)=> v<a?a:v>b?b:v;
const dist = (a,b)=> Math.hypot(a.x-b.x, a.y-b.y);

/* ============================== AUDIO ====================================== */
let AC = null;
function ensureAudio(){
  if (!AC){
    AC = new (window.AudioContext||window.webkitAudioContext)();
    masterGain = AC.createGain(); masterGain.gain.value = 0.7; masterGain.connect(AC.destination);
    // Low-pass filter for time-freeze muffling
    timeFilter = AC.createBiquadFilter(); timeFilter.type='lowpass'; timeFilter.frequency.value = 22000;
    timeFilter.connect(masterGain);
    // Ambient drone
    droneOsc = AC.createOscillator(); droneOsc.type='sawtooth'; droneOsc.frequency.value = 55;
    droneGain = AC.createGain(); droneGain.gain.value = 0.0;
    droneOsc.connect(droneGain); droneGain.connect(timeFilter); droneOsc.start();
    // Sub bass pad
    padOsc = AC.createOscillator(); padOsc.type='sine'; padOsc.frequency.value = 110;
    padGain = AC.createGain(); padGain.gain.value = 0.0;
    padOsc.connect(padGain); padGain.connect(timeFilter); padOsc.start();
  }
}
let masterGain, timeFilter, droneOsc, droneGain, padOsc, padGain;
function tone(freq, dur, type='square', vol=0.10, attack=0.005){
  if (!AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0, AC.currentTime);
  g.gain.linearRampToValueAtTime(vol, AC.currentTime + attack);
  g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + dur);
  o.connect(g); g.connect(timeFilter);
  o.start(); o.stop(AC.currentTime + dur + 0.02);
}
function noise(dur, vol=0.1, fc=4000){
  if (!AC) return;
  const buf = AC.createBuffer(1, AC.sampleRate*dur, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
  const src = AC.createBufferSource(); src.buffer = buf;
  const flt = AC.createBiquadFilter(); flt.type='lowpass'; flt.frequency.value = fc;
  const g = AC.createGain(); g.gain.value = vol;
  src.connect(flt); flt.connect(g); g.connect(timeFilter); src.start();
}
const Snd = {
  shoot(){ tone(1100, 0.06, 'square', 0.09); tone(550,0.10,'sawtooth',0.05); noise(0.05,0.06,8000); },
  enemyShoot(){ tone(260, 0.10, 'sawtooth', 0.045); },
  hit(){ tone(160, 0.18, 'sawtooth', 0.12); noise(0.08, 0.08, 1200); },
  kill(){ tone(80, 0.25, 'sawtooth', 0.18); tone(110,0.20,'square',0.10); noise(0.18,0.10,800); },
  dash(){ tone(1500, 0.08, 'sine', 0.07); tone(900,0.10,'triangle',0.05); },
  dryFire(){ tone(280, 0.05, 'triangle', 0.06); },
  reload(){ tone(520, 0.05, 'square', 0.06); setTimeout(()=>tone(740,0.07,'square',0.07),90); setTimeout(()=>tone(980,0.06,'square',0.07),180); },
  glass(){ noise(0.10, 0.10, 12000); tone(2400,0.05,'triangle',0.05); },
  echo(){ tone(440,0.20,'sine',0.10); tone(660,0.18,'sine',0.08); tone(880,0.16,'triangle',0.06); },
  rewind(){ tone(880,0.25,'sine',0.08); tone(660,0.25,'sine',0.06); },
  wave(){ tone(220,0.20,'square',0.10); setTimeout(()=>tone(330,0.20,'square',0.10),120); setTimeout(()=>tone(440,0.30,'square',0.12),280); },
  hurt(){ tone(140,0.18,'sawtooth',0.14); noise(0.10,0.10,800); },
  shockwave(){ tone(55,0.5,'sawtooth',0.12); noise(0.30,0.15,400); }
};

/* ============================ INPUT ======================================== */
const keys = {};
let mx = 0, my = 0, mouseDown = false, mouseFired = false;
addEventListener('keydown', e=>{ keys[e.code]=true; if(['Space','KeyW','KeyA','KeyS','KeyD','ShiftLeft','ShiftRight','KeyR','KeyP'].includes(e.code)) e.preventDefault(); });
addEventListener('keyup', e=>{ keys[e.code]=false; });
addEventListener('mousemove', e=>{ mx=e.clientX; my=e.clientY; const c=document.getElementById('cursor'); c.style.left=mx+'px'; c.style.top=my+'px'; });
addEventListener('mousedown', e=>{ if(e.button===0){ mouseDown=true; mouseFired=true; ensureAudio(); }});
addEventListener('mouseup', e=>{ if(e.button===0) mouseDown=false; });
addEventListener('contextmenu', e=>e.preventDefault());

/* ============================ STATE ======================================== */
let STATE = 'menu'; // menu | intro | playing | dead | victory
let timeScale = 0.02, targetTime = 0.02;
let camX = 0, camY = 0, camTX = 0, camTY = 0, camZoom = 1, camZoomT = 1;
let shake = 0, shakeX = 0, shakeY = 0;
let flashAlpha = 0, freezeAlpha = 0, hitstop = 0, slowmoBoost = 0;
let wave = 0, kills = 0, combo = 0, comboTimer = 0, maxCombo = 0;
let damageFlash = 0, victoryAnim = 0;
let echoReady = true, echoCooldown = 0;
let echoes = []; // recorded states for echo release
let recordBuffer = []; // rolling player position buffer for "time echo" replay
const ARENA = { w: 2200, h: 1400 };

let player, bullets, enemies, particles, glassWalls, props, walls, shockwaves, debris, ragdolls, decoys, hitMarks;

/* ============================ ENTITIES INIT ================================ */
function newPlayer(){
  return {
    x: ARENA.w/2, y: ARENA.h/2,
    vx:0, vy:0, ax:0, ay:0,
    r: 13, angle:0,
    hp: 5, maxHp: 5, iframes: 0,
    ammo: 6, maxAmmo: 6, shootCd: 0, reloading: false, reloadT: 0,
    dashCd: 0, dashT: 0, dashDx:0, dashDy:0, dashGhost:0,
    moving: false, aiming: false,
    alive: true,
    deathT: 0
  };
}

const PALETTE = {
  bg0: '#05060a', bg1: '#0a0e18', grid: 'rgba(80,160,220,0.10)', gridStrong: 'rgba(120,200,255,0.18)',
  player: '#9fe6ff', playerCore: '#fff',
  enemy: '#ff3c5a', enemyCore: '#ffd0d8',
  bullet: '#fff7c6', bulletEnemy: '#ff7a90',
  echo: '#a4ffea', accent:'#6df'
};

function buildArena(){
  walls = [];
  glassWalls = [];
  props = [];

  // Outer walls
  const t = 30;
  walls.push({x:0,y:0,w:ARENA.w,h:t});
  walls.push({x:0,y:ARENA.h-t,w:ARENA.w,h:t});
  walls.push({x:0,y:0,w:t,h:ARENA.h});
  walls.push({x:ARENA.w-t,y:0,w:t,h:ARENA.h});

  // A few internal cover pieces (procedurally placed but stable)
  const seeded = [
    [400, 300, 200, 30], [400, 1000, 200, 30],
    [1600, 350, 30, 220], [1700, 1100, 220, 30],
    [950, 600, 30, 200], [1200, 800, 200, 30],
    [600, 700, 30, 220], [1500, 600, 30, 220],
    [900, 250, 220, 30], [350, 700, 30, 200]
  ];
  for (const [x,y,w,h] of seeded) walls.push({x,y,w,h});

  // Glass walls (breakable)
  glassWalls.push({x:1050, y:400, w:14, h:200, hp:3, max:3});
  glassWalls.push({x:1050, y:850, w:14, h:200, hp:3, max:3});
  glassWalls.push({x:300, y:1180, w:200, h:14, hp:3, max:3});
  glassWalls.push({x:1700, y:200, w:200, h:14, hp:3, max:3});

  // Destructible props (barrels)
  for (let i=0;i<8;i++){
    let px, py, ok=false, tries=0;
    while(!ok && tries++ < 50){
      px = rnd(120, ARENA.w-120); py = rnd(120, ARENA.h-120);
      ok = !walls.some(w=>circleRect(px,py,30,w.x,w.y,w.w,w.h));
    }
    if (ok) props.push({x:px,y:py,r:18,hp:1,kind:'barrel',vx:0,vy:0,broken:false});
  }
}

/* ============================ WAVES ======================================== */
const WAVES = [
  {name:'INITIATION', enemies:[['shooter',2]], desc:'TIME MOVES WHEN YOU MOVE'},
  {name:'CROSSFIRE', enemies:[['shooter',3]], desc:'FIND THE ANGLES'},
  {name:'RUSH', enemies:[['shooter',2],['rusher',2]], desc:'SHIFT TO DASH'},
  {name:'WARDEN', enemies:[['warden',1]], desc:'DESTROY THE SHIELD NODES', boss:true},
  {name:'GHOSTS', enemies:[['shooter',1],['dodger',2]], desc:'THEY READ YOUR BULLETS'},
  {name:'STRATEGEM', enemies:[['tactician',2],['dodger',1]], desc:'TACTICIANS USE COVER'},
  {name:'CHRONARCH', enemies:[['chronarch',1]], desc:'MASTER OF TIME', boss:true},
  {name:'SCOPE', enemies:[['sniper',2],['rusher',1]], desc:'EYES IN THE DARK · BREAK SIGHTLINES'},
  {name:'SWARM', enemies:[['splitter',2],['dodger',1]], desc:'KILL THEM TWICE'},
  {name:'PHANTOM', enemies:[['phantom',1]], desc:'STRIKE WHEN IT FLICKERS', boss:true},
  {name:'PARADOX', enemies:[['phaser',2],['tactician',1],['sniper',1]], desc:'STILLNESS FEEDS THEM'},
  {name:'OMEGA', enemies:[['omega',1]], desc:'END OF ALL TIME', boss:true, final:true}
];

function startWave(idx){
  wave = idx; combo = 0; comboTimer = 0;
  const W = WAVES[idx]; if (!W){ STATE='victory'; victoryAnim = 0; showCenter('VICTORY', 'TIME IS YOURS', ''); return; }
  enemies = []; bullets = []; particles = [];
  shockwaves = []; debris = []; ragdolls = []; decoys = []; hitMarks = [];
  recordBuffer = []; echoes = []; echoReady = true; echoCooldown = 0;
  buildArena();
  player.x = ARENA.w/2; player.y = ARENA.h - 240; player.vx=0; player.vy=0; player.iframes = 1.0;
  player.alive = true; player.hp = player.maxHp;
  player.ammo = player.maxAmmo; player.reloading = false; player.reloadT = 0;
  player.dashCd = 0; player.dashT = 0;
  camX = player.x; camY = player.y; camTX = camX; camTY = camY;

  for (const [type, count] of W.enemies){
    for (let i=0;i<count;i++){
      const pos = randSpawnFar(player);
      spawnEnemy(type, pos.x, pos.y);
    }
  }
  showCenter(`WAVE ${String(idx+1).padStart(2,'0')}`, W.name, W.desc);
  Snd.wave();
}

function randSpawnFar(target){
  for (let i=0;i<60;i++){
    const x = rnd(120, ARENA.w-120), y = rnd(120, ARENA.h-120);
    if (Math.hypot(x-target.x, y-target.y) < 380) continue;
    if (walls.some(w=>circleRect(x,y,22,w.x,w.y,w.w,w.h))) continue;
    return {x,y};
  }
  return {x: 200, y: 200};
}

/* ============================ ENEMIES ======================================= */
const BOSS_TYPES = ['warden','chronarch','phantom','omega'];
function spawnEnemy(type, x, y){
  const base = {
    x, y, vx:0, vy:0, r:13, angle:0, alive:true, hp:1, type,
    fireCd: rnd(0.6, 1.6), strafe: Math.random()<.5?1:-1, strafeT: rnd(0.6,1.5),
    aware: false, awareT: 0, hurt:0, dodgeCd:0
  };
  if (type==='shooter'){ Object.assign(base, {speed:60, hp:1, fireRate: 2.2}); }
  else if (type==='rusher'){ Object.assign(base, {speed:170, hp:1, fireRate: 0.0, melee:true}); }
  else if (type==='dodger'){ Object.assign(base, {speed:95, hp:1, fireRate: 1.8, canDodge:true}); }
  else if (type==='tactician'){
    Object.assign(base, {speed:75, hp:2, maxHp:2, fireRate: 1.2,
      burstShots:0, burstCd:0, coverTarget:null, coverFindT:0, atCover:false, peekT:0});
  }
  else if (type==='sniper'){
    Object.assign(base, {speed:40, hp:1, fireRate: 3.0, r:12,
      chargeT:0, charging:false, locked:false});
  }
  else if (type==='splitter'){
    Object.assign(base, {speed:110, hp:2, maxHp:2, fireRate: 0.0, r:16,
      melee:true, splits:true, generation:0});
  }
  else if (type==='minion'){
    Object.assign(base, {speed:200, hp:1, fireRate: 0.0, r:8, melee:true, generation:1});
  }
  else if (type==='phaser'){
    Object.assign(base, {speed:60, hp:2, maxHp:2, fireRate: 1.6, r:14, phaser:true, phase:0});
  }
  else if (BOSS_TYPES.includes(type)){
    const cfg = {
      warden:   {hp:14, r:28, speed:42, fireRate:1.8, phases:3},
      chronarch:{hp:18, r:26, speed:55, fireRate:2.2, phases:3},
      phantom:  {hp:16, r:24, speed:0,  fireRate:1.6, phases:3},
      omega:    {hp:28, r:32, speed:48, fireRate:2.0, phases:4}
    }[type];
    Object.assign(base, {
      speed:cfg.speed, hp:cfg.hp, maxHp:cfg.hp, r:cfg.r, fireRate:cfg.fireRate,
      isBoss:true, bossType:type,
      phase:1, maxPhase:cfg.phases,
      attackPattern:0, attackT:1.5, moveT:0, tx:x, ty:y,
      // warden
      nodes:[], shielded:false, shieldRespawnT:0,
      // chronarch
      laserActive:false, laserT:0, laserAngle:0,
      forcedTimeT:0, forcedTime:0.4,
      // phantom
      teleportCd:1.5, teleportWindup:0, vulnerable:false, vulnerableT:0, decoys:[],
      // omega
      omegaLaserActive:false, omegaLaserT:0, omegaLaserAngle:0,
      summonCd: 8.0
    });
    if (type==='warden') spawnWardenNodes(base);
    if (type==='phantom'){ base.shielded = true; }
  }
  enemies.push(base);
}

function spawnWardenNodes(b){
  b.nodes = [];
  for (let i=0;i<3;i++){
    b.nodes.push({angle:(TAU/3)*i - Math.PI/2, dist:78, hp:2, alive:true, flashT:0, r:10});
  }
  b.shielded = true;
}

/* ============================ GEOMETRY HELPERS ============================= */
function circleRect(cx,cy,cr,rx,ry,rw,rh){
  const nx = clamp(cx,rx,rx+rw), ny = clamp(cy,ry,ry+rh);
  return Math.hypot(cx-nx, cy-ny) < cr;
}
function pushOut(cx,cy,cr,rx,ry,rw,rh){
  const nx = clamp(cx,rx,rx+rw), ny = clamp(cy,ry,ry+rh);
  const dx = cx-nx, dy = cy-ny, d = Math.hypot(dx,dy);
  if (d>0 && d<cr){ const pen = cr-d; return {x:cx + dx/d*pen, y:cy + dy/d*pen, nx:dx/d, ny:dy/d}; }
  return null;
}
function segHitsRect(x1,y1,x2,y2,rx,ry,rw,rh){
  // Liang-Barsky
  let t0=0, t1=1; const dx=x2-x1, dy=y2-y1;
  const p=[-dx,dx,-dy,dy], q=[x1-rx, rx+rw-x1, y1-ry, ry+rh-y1];
  for (let i=0;i<4;i++){
    if (p[i]===0){ if (q[i]<0) return null; }
    else{ const t=q[i]/p[i]; if (p[i]<0){ if (t>t1) return null; if (t>t0) t0=t; } else { if (t<t0) return null; if (t<t1) t1=t; } }
  }
  return {t:t0, x:x1+dx*t0, y:y1+dy*t0};
}
function lineOfSight(a,b){
  for (const w of walls){
    if (segHitsRect(a.x,a.y,b.x,b.y,w.x,w.y,w.w,w.h)) return false;
  }
  return true;
}
function findCoverPos(self, threat, maxDist){
  let best = null, bestScore = -Infinity;
  for (const w of walls){
    const cx = w.x+w.w/2, cy = w.y+w.h/2;
    const positions = [
      {x:w.x-22, y:cy}, {x:w.x+w.w+22, y:cy},
      {x:cx, y:w.y-22}, {x:cx, y:w.y+w.h+22}
    ];
    for (const p of positions){
      if (p.x < 60 || p.x > ARENA.w-60 || p.y < 60 || p.y > ARENA.h-60) continue;
      const d = Math.hypot(p.x-self.x, p.y-self.y);
      if (d > maxDist) continue;
      if (walls.some(w2 => circleRect(p.x,p.y,18,w2.x,w2.y,w2.w,w2.h))) continue;
      // Prefer positions where the wall is between self and threat
      const aToWall = Math.atan2(cy - threat.y, cx - threat.x);
      const aToPos = Math.atan2(p.y - threat.y, p.x - threat.x);
      const align = Math.abs(((aToWall - aToPos + Math.PI*3) % TAU) - Math.PI);
      const score = (1 - d/maxDist) + (align < 0.35 ? 2 : 0);
      if (score > bestScore){ bestScore = score; best = p; }
    }
  }
  return best;
}

/* ============================ BOSS AI ======================================= */
function updateBossEntity(e, dt, tdt, toP, sees){
  // Common: drift / move to a target point that updates over time
  e.moveT -= tdt;
  if (e.moveT <= 0){
    e.moveT = rnd(2.5, 4.5);
    e.tx = clamp(player.x + rnd(-500,500), 200, ARENA.w-200);
    e.ty = clamp(player.y + rnd(-500,500), 200, ARENA.h-300);
  }
  const tA = Math.atan2(e.ty - e.y, e.tx - e.x);
  const tD = Math.hypot(e.ty - e.x, e.ty - e.y);
  const bSpd = e.speed * (1 + (e.phase-1)*0.18);
  e.vx = Math.cos(tA) * bSpd; e.vy = Math.sin(tA) * bSpd;

  // Phase transitions
  const newPhase = Math.min(e.maxPhase, 1 + Math.floor((1 - e.hp/e.maxHp) * e.maxPhase));
  if (newPhase > e.phase){
    e.phase = newPhase;
    shake = Math.max(shake, 0.35); flashAlpha = Math.max(flashAlpha, 0.2);
    Snd.wave();
    for (let i=0;i<40;i++){const a=rnd(0,TAU),s=rnd(80,260);particles.push({x:e.x,y:e.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(0.5,1.0),max:1.0,r:rnd(2,4),color:'#ff8a30',kind:'spark'});}
    if (e.bossType==='warden') spawnWardenNodes(e);
    if (e.bossType==='chronarch' && e.phase >= 2){
      spawnAdd('shooter', e.x + rnd(-300,300), e.y + rnd(-200,200));
      if (e.phase>=3) spawnAdd('dodger', e.x + rnd(-300,300), e.y + rnd(-200,200));
    }
    if (e.bossType==='phantom' && e.phase >= 2){
      spawnAdd('rusher', e.x + rnd(-200,200), e.y + 200);
      if (e.phase>=3) spawnAdd('dodger', e.x + rnd(-200,200), e.y - 200);
    }
    if (e.bossType==='omega'){
      const adds = ['shooter','dodger','rusher','tactician'];
      spawnAdd(adds[(e.phase-2)%adds.length], e.x + rnd(-300,300), e.y + rnd(-200,200));
    }
  }

  if (e.bossType==='warden') updateWarden(e, dt, tdt, toP, sees);
  else if (e.bossType==='chronarch') updateChronarch(e, dt, tdt, toP, sees);
  else if (e.bossType==='phantom') updatePhantom(e, dt, tdt, toP, sees);
  else if (e.bossType==='omega') updateOmega(e, dt, tdt, toP, sees);
}

function spawnAdd(type, x, y){
  if (!isFinite(x) || !isFinite(y)) return;
  // Don't spawn inside walls
  for (let tries=0; tries<10; tries++){
    if (!walls.some(w=>circleRect(x,y,18,w.x,w.y,w.w,w.h)) && x>60 && x<ARENA.w-60 && y>60 && y<ARENA.h-60){
      spawnEnemy(type, x, y); return;
    }
    x += rnd(-80,80); y += rnd(-80,80);
  }
}

function updateWarden(e, dt, tdt, toP, sees){
  for (const n of e.nodes){
    if (n.alive){ n.angle += 0.7*tdt; n.flashT = Math.max(0, n.flashT - dt); }
  }
  // Shield gone? cycle a vulnerable window, then respawn nodes
  if (e.shielded && e.nodes.every(n=>!n.alive)){
    e.shielded = false; e.shieldRespawnT = 4.0;
  } else if (!e.shielded){
    e.shieldRespawnT -= tdt;
    if (e.shieldRespawnT <= 0) spawnWardenNodes(e);
  }
  e.attackT -= tdt;
  if (e.attackT <= 0 && sees){
    e.attackT = Math.max(0.8, 2.4 - e.phase*0.4);
    const p = (e.attackPattern++) % 3;
    if (p===0){ // arc spread
      const c = 3 + e.phase;
      for (let i=0;i<c;i++){
        const sp = 0.6 + e.phase*0.15;
        const a = toP - sp/2 + (sp/(c-1))*i;
        fireBullet('enemy', e.x+Math.cos(a)*30, e.y+Math.sin(a)*30, Math.cos(a)*420, Math.sin(a)*420);
      }
    } else if (p===1){ // full ring
      const c = 8 + e.phase*2;
      for (let i=0;i<c;i++){ const a = (TAU/c)*i; fireBullet('enemy', e.x+Math.cos(a)*30, e.y+Math.sin(a)*30, Math.cos(a)*330, Math.sin(a)*330); }
    } else { // aimed triple-burst
      for (let i=0;i<3;i++){
        setTimeout(()=>{ if (!e.alive) return; const a = Math.atan2(player.y-e.y, player.x-e.x) + rnd(-0.08,0.08);
          fireBullet('enemy', e.x+Math.cos(a)*30, e.y+Math.sin(a)*30, Math.cos(a)*520, Math.sin(a)*520);
        }, i*120);
      }
    }
    Snd.enemyShoot();
  }
}

function updateChronarch(e, dt, tdt, toP, sees){
  if (e.forcedTimeT > 0) e.forcedTimeT -= dt;
  e.attackT -= tdt;
  if (e.laserActive){
    e.laserT -= tdt;
    e.laserAngle += (1.1 + e.phase*0.3) * tdt;
    if (e.laserT <= 0) e.laserActive = false;
    if (player.alive && player.iframes <= 0){
      const lx = Math.cos(e.laserAngle), ly = Math.sin(e.laserAngle);
      const dx = player.x - e.x, dy = player.y - e.y;
      const proj = dx*lx + dy*ly;
      if (proj > 0 && proj < 700){
        const perp = Math.abs(dx*ly - dy*lx);
        if (perp < player.r + 6 && player.dashT <= 0) damagePlayer(1);
      }
    }
  }
  if (e.attackT <= 0 && sees){
    e.attackT = Math.max(1.0, 3.0 - e.phase*0.6);
    const p = (e.attackPattern++) % (2 + e.phase);
    if (p===0){ e.laserActive = true; e.laserT = 1.8; e.laserAngle = toP - Math.PI*0.3; tone(1800,0.3,'sawtooth',0.06); }
    else if (p===1){ shockwaves.push({x:e.x,y:e.y,r:20,maxR:520,life:0,maxLife:1.5,hit:false}); Snd.shockwave(); shake = Math.max(shake,0.2); }
    else if (p===2){
      const c = 12;
      for (let i=0;i<c;i++){
        setTimeout(()=>{ if (!e.alive) return;
          const a = toP + (TAU/c)*i + performance.now()*0.001;
          fireBullet('enemy', e.x+Math.cos(a)*30, e.y+Math.sin(a)*30, Math.cos(a)*330, Math.sin(a)*330);
        }, i*70);
      }
    }
    else if (p===3 && e.phase>=3){
      // Force-time anomaly: time advances regardless of player movement for a moment
      e.forcedTimeT = 1.6; e.forcedTime = 0.45;
      for (let i=0;i<18;i++){const a=rnd(0,TAU),s=rnd(40,160);particles.push({x:e.x,y:e.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.8,max:0.8,r:rnd(2,4),color:'#b070ff',kind:'spark'});}
      tone(180,0.4,'sawtooth',0.12);
    }
    Snd.enemyShoot();
  }
}

function updatePhantom(e, dt, tdt, toP, sees){
  // No drift movement (teleports instead)
  e.vx = 0; e.vy = 0;
  e.teleportCd = Math.max(0, e.teleportCd - tdt);

  if (e.teleportWindup > 0){
    e.teleportWindup -= tdt;
    if (e.teleportWindup <= 0){
      Snd.echo();
      e.decoys.push({x:e.x, y:e.y, life:2.0, alpha:0.7, angle:e.angle});
      if (e.decoys.length > 3) e.decoys.shift();
      for (let tries=0; tries<24; tries++){
        const nx = rnd(180, ARENA.w-180), ny = rnd(180, ARENA.h*0.65);
        if (!walls.some(w=>circleRect(nx,ny,30,w.x,w.y,w.w,w.h))){ e.x = nx; e.y = ny; break; }
      }
      e.vulnerable = true; e.vulnerableT = 1.8 + e.phase*0.3; e.shielded = false;
      for (let i=0;i<18;i++){const a=rnd(0,TAU),s=rnd(40,180);particles.push({x:e.x,y:e.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.4,max:0.4,r:rnd(2,3),color:'#c45dff',kind:'spark'});}
      shake = Math.max(shake, 0.18);
    }
  }
  if (e.vulnerable){
    e.vulnerableT -= tdt;
    if (e.vulnerableT <= 0){
      e.vulnerable = false; e.shielded = true;
      e.teleportCd = Math.max(1.4, 2.8 - e.phase*0.35);
    }
  }
  if (e.teleportCd <= 0 && e.teleportWindup <= 0 && !e.vulnerable){
    e.teleportWindup = 0.5;
    e.shielded = true;
  }
  for (let i=e.decoys.length-1;i>=0;i--){ const d=e.decoys[i]; d.life -= tdt; if (d.life <= 0) e.decoys.splice(i,1); }

  e.attackT -= tdt;
  if (e.attackT <= 0 && sees){
    e.attackT = Math.max(0.7, 1.8 - e.phase*0.3);
    const p = (e.attackPattern++) % 3;
    if (p===0){
      for (let i=-1;i<=1;i++){ const a = toP + i*0.16; fireBullet('enemy', e.x+Math.cos(a)*26, e.y+Math.sin(a)*26, Math.cos(a)*500, Math.sin(a)*500); }
    } else if (p===1){
      const c = 6 + e.phase*2;
      for (let i=0;i<c;i++){ const a = (TAU/c)*i + rnd(0,0.3); fireBullet('enemy', e.x+Math.cos(a)*26, e.y+Math.sin(a)*26, Math.cos(a)*340, Math.sin(a)*340); }
    } else {
      // Each decoy fires too
      for (const d of e.decoys){
        const a = Math.atan2(player.y - d.y, player.x - d.x);
        fireBullet('enemy', d.x+Math.cos(a)*20, d.y+Math.sin(a)*20, Math.cos(a)*420, Math.sin(a)*420);
      }
      const a = toP;
      fireBullet('enemy', e.x+Math.cos(a)*22, e.y+Math.sin(a)*22, Math.cos(a)*460, Math.sin(a)*460);
    }
    Snd.enemyShoot();
  }
}

function updateOmega(e, dt, tdt, toP, sees){
  // Dual laser
  if (e.omegaLaserActive){
    e.omegaLaserT -= tdt;
    e.omegaLaserAngle += (0.9 + e.phase*0.2) * tdt;
    if (e.omegaLaserT <= 0) e.omegaLaserActive = false;
    if (player.alive && player.iframes <= 0){
      for (let off=0; off<2; off++){
        const la = e.omegaLaserAngle + off*Math.PI;
        const lx = Math.cos(la), ly = Math.sin(la);
        const dx = player.x - e.x, dy = player.y - e.y;
        const proj = dx*lx + dy*ly;
        if (proj > 0 && proj < 800){
          const perp = Math.abs(dx*ly - dy*lx);
          if (perp < player.r + 6 && player.dashT <= 0) damagePlayer(1);
        }
      }
    }
  }
  e.attackT -= tdt;
  if (e.attackT <= 0 && sees){
    e.attackT = Math.max(0.7, 2.3 - e.phase*0.32);
    const p = (e.attackPattern++) % (3 + Math.min(e.phase-1,2));
    if (p===0){
      e.omegaLaserActive = true; e.omegaLaserT = 2.3; e.omegaLaserAngle = rnd(0,TAU);
      tone(1800,0.4,'sawtooth',0.08);
    } else if (p===1){
      const c = 10 + e.phase*3;
      for (let i=0;i<c;i++){ const a = (TAU/c)*i; fireBullet('enemy', e.x+Math.cos(a)*32, e.y+Math.sin(a)*32, Math.cos(a)*300, Math.sin(a)*300); }
      for (let i=0;i<3;i++){ const a = toP + rnd(-0.15,0.15); fireBullet('enemy', e.x+Math.cos(a)*32, e.y+Math.sin(a)*32, Math.cos(a)*560, Math.sin(a)*560); }
    } else if (p===2){
      shockwaves.push({x:e.x,y:e.y,r:20,maxR:600,life:0,maxLife:1.8,hit:false});
      Snd.shockwave(); shake = Math.max(shake,0.25);
    } else if (p===3){
      const c = 16;
      for (let i=0;i<c;i++){
        setTimeout(()=>{ if (!e.alive) return;
          const a = (TAU/c)*i*2 + performance.now()*0.002;
          fireBullet('enemy', e.x+Math.cos(a)*32, e.y+Math.sin(a)*32, Math.cos(a)*340, Math.sin(a)*340);
        }, i*55);
      }
    } else if (p===4){
      shockwaves.push({x:e.x,y:e.y,r:20,maxR:600,life:0,maxLife:1.6,hit:false});
      setTimeout(()=>{ if (e.alive) shockwaves.push({x:e.x,y:e.y,r:20,maxR:600,life:0,maxLife:1.6,hit:false}); Snd.shockwave(); }, 380);
      Snd.shockwave(); shake = Math.max(shake, 0.3);
    }
    Snd.enemyShoot();
  }
}

/* ============================ COMBAT / DAMAGE =============================== */
function fireBullet(owner, x, y, vx, vy, opts={}){
  bullets.push({
    x, y, vx, vy, owner, life: opts.life||2.2,
    r: opts.r||3, trail: [], pierce: opts.pierce||0,
    ricochet: opts.ricochet||0,
    color: owner==='player' ? PALETTE.bullet : PALETTE.bulletEnemy,
    big: opts.big||false
  });
}

function damageEnemy(e, src, isCrit){
  // Phantom is invulnerable unless in its vulnerable window
  if (e.isBoss && e.bossType==='phantom' && !e.vulnerable){
    for (let i=0;i<5;i++){const a=rnd(0,TAU);particles.push({x:e.x,y:e.y,vx:Math.cos(a)*120,vy:Math.sin(a)*120,life:0.2,max:0.2,r:2,color:'#c45dff',kind:'spark'});}
    tone(420,0.06,'triangle',0.05);
    return;
  }
  e.hp -= 1; e.hurt = 0.18;
  if (e.hp <= 0){
    e.alive = false;
    kills++; combo++; comboTimer = 2.2; maxCombo = Math.max(maxCombo, combo);
    showCombo();
    Snd.kill();
    const bossKill = !!e.isBoss;
    hitstop = bossKill ? 0.22 : 0.07 + Math.min(0.12, combo*0.005);
    shake = Math.max(shake, bossKill ? 0.7 : 0.35);
    flashAlpha = Math.max(flashAlpha, bossKill ? 0.5 : 0.18);
    camZoomT = bossKill ? 1.12 : 1.06; setTimeout(()=>{ camZoomT = 1.0; }, bossKill ? 260 : 120);
    spawnRagdoll(e);
    const partCount = bossKill ? 80 : 28;
    for (let i=0;i<partCount;i++){
      const a = rnd(0, TAU), s = rnd(120, bossKill ? 520 : 380);
      particles.push({x:e.x,y:e.y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life: rnd(0.4,bossKill?1.6:0.9), max:1.6, r:rnd(1.5,bossKill?5:3.5), color:bossKill?'#ffae3a':'#ff5a72', kind:'spark'});
    }
    for (let i=0;i<(bossKill?28:10);i++){
      const a = rnd(0,TAU), s=rnd(60,bossKill?340:260);
      debris.push({x:e.x,y:e.y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, av:rnd(-8,8), rot:rnd(0,TAU), w:rnd(2,bossKill?6:5),h:rnd(2,bossKill?8:7), life:rnd(0.8,2.2), color:bossKill?'#ffae3a':'#ff8a9a'});
    }
    // Splitter: spawn minions on death
    if (e.type==='splitter' && e.generation === 0){
      for (let i=0;i<2;i++){
        const a = rnd(0,TAU);
        spawnEnemy('minion', e.x + Math.cos(a)*24, e.y + Math.sin(a)*24);
        const m = enemies[enemies.length-1];
        m.vx = Math.cos(a)*180; m.vy = Math.sin(a)*180;
      }
      tone(500,0.12,'square',0.08); tone(740,0.10,'square',0.06);
    }
  } else {
    Snd.hit();
    hitstop = 0.025;
    shake = Math.max(shake, 0.12);
    for (let i=0;i<8;i++){
      const a = rnd(0, TAU), s = rnd(60, 220);
      particles.push({x:e.x,y:e.y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life: rnd(0.2,0.5), max:0.5, r:rnd(1,2), color:'#ffd0d8', kind:'spark'});
    }
  }
}

function spawnRagdoll(e){
  // 3-segment ragdoll: head + body + legs
  const segs = [];
  const a = e.angle;
  for (let i=0;i<3;i++){
    segs.push({
      x: e.x + Math.cos(a)*(i-1)*8,
      y: e.y + Math.sin(a)*(i-1)*8,
      vx: e.vx + rnd(-80,80) + Math.cos(a)*60,
      vy: e.vy + rnd(-80,80) + Math.sin(a)*60,
      r: i===1?9:6
    });
  }
  ragdolls.push({segs, life: 3.0, rot: rnd(-3,3), color:'#9a2236'});
}

function damagePlayer(amount=1){
  if (player.iframes > 0 || !player.alive) return;
  player.hp -= amount; player.iframes = 1.0;
  damageFlash = 0.6; shake = Math.max(shake, 0.5);
  Snd.hurt();
  if (player.hp <= 0){
    player.alive = false; player.deathT = 0;
    STATE = 'dead';
    showCenter('TIME ENDS', 'PRESS R TO REWIND', '');
    Snd.kill();
    for (let i=0;i<60;i++){ const a=rnd(0,TAU), s=rnd(80,360); particles.push({x:player.x,y:player.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(0.6,1.5),max:1.5,r:rnd(1.5,3.5),color:PALETTE.player,kind:'spark'}); }
  }
}

/* ============================ UPDATE ======================================== */
function update(realDt){
  if (STATE === 'menu') return;

  // Hit-stop freezes everything briefly on kills
  if (hitstop > 0){ hitstop -= realDt; return; }

  // Determine if player is "acting" (drives global timescale)
  const moveL = keys.KeyA||keys.ArrowLeft, moveR = keys.KeyD||keys.ArrowRight;
  const moveU = keys.KeyW||keys.ArrowUp,   moveD = keys.KeyS||keys.ArrowDown;
  let ix = (moveR?1:0) - (moveL?1:0);
  let iy = (moveD?1:0) - (moveU?1:0);
  const im = Math.hypot(ix,iy); if (im>1){ ix/=im; iy/=im; }

  // Camera follows world-space cursor for aim
  const worldMX = mx - cv.width/2 + camX;
  const worldMY = my - cv.height/2 + camY;
  const newAngle = Math.atan2(worldMY - player.y, worldMX - player.x);
  const aimDelta = Math.abs(((newAngle - player.angle + Math.PI*3) % TAU) - Math.PI);
  player.angle = newAngle;

  const moving = im > 0.05;
  const aiming = aimDelta > 0.008;
  const shooting = mouseFired || mouseDown;
  const dashing = player.dashT > 0;
  const acting = moving || aiming || shooting || dashing || slowmoBoost > 0;

  player.moving = moving; player.aiming = aiming;

  targetTime = acting ? 1.0 : 0.02;
  // Chronarch forced-time anomaly: time advances even when player is still
  let timeFloor = 0.02;
  for (const e of enemies){
    if (e.alive && e.isBoss && e.bossType==='chronarch' && e.forcedTimeT > 0){
      timeFloor = Math.max(timeFloor, e.forcedTime || 0.4);
    }
  }
  if (timeFloor > 0.02) targetTime = Math.max(targetTime, timeFloor);
  // Smooth time
  timeScale = lerp(timeScale, targetTime, Math.min(1, realDt * 14));
  timeScale = Math.max(timeScale, timeFloor);
  // Audio feedback: filter cutoff & drone gain follow time
  if (AC){
    timeFilter.frequency.setTargetAtTime(220 + timeScale*16000, AC.currentTime, 0.08);
    const intensity = Math.min(1, enemies.filter(e=>e.alive).length / 6);
    droneGain.gain.setTargetAtTime(0.02 + 0.05*timeScale + 0.03*intensity, AC.currentTime, 0.2);
    padGain.gain.setTargetAtTime(0.015 + 0.04*timeScale*intensity, AC.currentTime, 0.2);
  }

  const ts = timeScale;
  const dt = realDt;       // real time (for HUD timers, anim)
  const tdt = realDt * ts; // scaled time (for world)

  // Slow-mo flash decay
  slowmoBoost = Math.max(0, slowmoBoost - dt);

  // Damage flash decay
  damageFlash = Math.max(0, damageFlash - dt*1.4);
  flashAlpha = Math.max(0, flashAlpha - dt*3);
  freezeAlpha = Math.max(0, freezeAlpha - dt*2);

  // Camera shake
  shake = Math.max(0, shake - dt*2.4);
  shakeX = (Math.random()*2-1)*shake*22;
  shakeY = (Math.random()*2-1)*shake*22;

  // Camera follow target
  camZoom = lerp(camZoom, camZoomT, Math.min(1, dt*6));
  if (player.alive){
    const aheadX = Math.cos(player.angle) * 80;
    const aheadY = Math.sin(player.angle) * 80;
    camTX = player.x + aheadX + (worldMX - player.x)*0.15;
    camTY = player.y + aheadY + (worldMY - player.y)*0.15;
  }
  camX = lerp(camX, camTX, Math.min(1, dt*5));
  camY = lerp(camY, camTY, Math.min(1, dt*5));

  // Combo decay
  if (comboTimer > 0){ comboTimer -= dt; if (comboTimer <= 0){ combo = 0; } }

  if (STATE !== 'playing') return;

  // ---------- Player ----------
  if (player.alive){
    player.iframes = Math.max(0, player.iframes - dt);

    // Dash
    if ((keys.ShiftLeft||keys.ShiftRight) && player.dashCd <= 0 && player.dashT <= 0 && im > 0.05){
      player.dashT = 0.18; player.dashCd = 1.0;
      player.dashDx = ix; player.dashDy = iy; player.iframes = Math.max(player.iframes, 0.22);
      Snd.dash(); slowmoBoost = 0.35;
      for (let i=0;i<14;i++){
        const a = rnd(0,TAU), s = rnd(80,240);
        particles.push({x:player.x,y:player.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.4,max:0.4,r:2,color:'#a4ffea',kind:'echo'});
      }
    }
    player.dashCd = Math.max(0, player.dashCd - dt);
    if (player.dashT > 0){
      player.dashT -= dt;
      player.vx = player.dashDx * 720;
      player.vy = player.dashDy * 720;
      player.dashGhost += dt;
      if (player.dashGhost > 0.02){
        player.dashGhost = 0;
        particles.push({x:player.x,y:player.y,vx:0,vy:0,life:0.32,max:0.32,r:11,color:'#9fe6ff',kind:'ghost'});
      }
    } else {
      // Acceleration-based movement
      const targetVX = ix * 380, targetVY = iy * 380;
      const accel = im > 0.05 ? 1800 : 2400;
      player.vx = lerp(player.vx, targetVX, Math.min(1, dt * accel/380));
      player.vy = lerp(player.vy, targetVY, Math.min(1, dt * accel/380));
    }

    // Movement is on REAL time so input feels crisp regardless of time-scale
    player.x += player.vx * dt;
    player.y += player.vy * dt;

    // Wall collide
    for (const w of walls){
      const p = pushOut(player.x, player.y, player.r, w.x, w.y, w.w, w.h);
      if (p){ player.x = p.x; player.y = p.y; player.vx *= 0.6; player.vy *= 0.6; }
    }
    for (const g of glassWalls){
      if (g.hp <= 0) continue;
      const p = pushOut(player.x, player.y, player.r, g.x, g.y, g.w, g.h);
      if (p){ player.x = p.x; player.y = p.y; player.vx *= 0.5; player.vy *= 0.5; }
    }
    for (const pr of props){
      if (pr.broken) continue;
      const p = pushOut(player.x, player.y, player.r, pr.x-pr.r, pr.y-pr.r, pr.r*2, pr.r*2);
      if (p){ player.x = p.x; player.y = p.y; pr.vx += player.vx*0.04*dt; pr.vy += player.vy*0.04*dt; }
    }

    // Reload
    if (player.reloading){
      player.reloadT -= tdt;
      if (player.reloadT <= 0){ player.reloading = false; player.ammo = player.maxAmmo; Snd.reload(); }
    } else if (player.ammo <= 0){
      player.reloading = true; player.reloadT = 1.0;
    }

    // Shoot
    player.shootCd = Math.max(0, player.shootCd - dt);
    if (mouseFired){
      if (player.ammo > 0 && !player.reloading && player.shootCd <= 0){
        const bx = Math.cos(player.angle), by = Math.sin(player.angle);
        fireBullet('player', player.x + bx*22, player.y + by*22, bx*900, by*900, {ricochet:1});
        player.ammo--; player.shootCd = 0.18;
        Snd.shoot();
        player.vx -= bx*60; player.vy -= by*60;
        shake = Math.max(shake, 0.10);
        // Muzzle flash particles
        for (let i=0;i<6;i++){
          const a = player.angle + rnd(-0.3,0.3);
          particles.push({x:player.x+bx*22,y:player.y+by*22,vx:Math.cos(a)*rnd(80,220),vy:Math.sin(a)*rnd(80,220),life:0.18,max:0.18,r:2,color:'#fff7c6',kind:'spark'});
        }
        particles.push({x:player.x+bx*22,y:player.y+by*22,vx:0,vy:0,life:0.10,max:0.10,r:18,color:'#fff7c6',kind:'flash'});
      } else if (player.ammo <= 0 && !player.reloading) Snd.dryFire();
    }

    // Echo release (Space) — replay the player's recent movement as a "time echo" that fires
    if (keys.Space && echoReady && recordBuffer.length > 30){
      releaseEcho();
      echoReady = false; echoCooldown = 6.0;
    }
    if (!echoReady){
      echoCooldown -= dt;
      if (echoCooldown <= 0) echoReady = true;
    }

    // Record rolling buffer of player (for echoes)
    recordBuffer.push({x:player.x,y:player.y,angle:player.angle,shooting:mouseFired,t:performance.now()});
    if (recordBuffer.length > 220) recordBuffer.shift();
  } else {
    player.deathT += dt;
  }

  // ---------- Echoes (time clones) ----------
  for (let i=echoes.length-1;i>=0;i--){
    const ec = echoes[i];
    ec.t += tdt;
    while (ec.idx < ec.frames.length-1 && ec.frames[ec.idx].relT < ec.t) ec.idx++;
    const f = ec.frames[ec.idx];
    ec.x = f.x; ec.y = f.y; ec.angle = f.angle;
    // Fire
    if (f.shoot && !ec.firedAt[ec.idx]){
      ec.firedAt[ec.idx] = true;
      const bx = Math.cos(f.angle), by = Math.sin(f.angle);
      fireBullet('player', ec.x + bx*18, ec.y + by*18, bx*820, by*820, {ricochet:0});
      Snd.shoot();
    }
    ec.life -= tdt;
    if (ec.life <= 0 || ec.idx >= ec.frames.length-1) echoes.splice(i,1);
  }

  // ---------- Enemies ----------
  for (const e of enemies){
    if (!e.alive) continue;
    e.hurt = Math.max(0, e.hurt - dt);
    const toP = Math.atan2(player.y - e.y, player.x - e.x);
    e.angle = toP;
    const sees = lineOfSight(e, player);
    if (sees){ e.aware = true; e.awareT = 4.0; }
    else { e.awareT = Math.max(0, e.awareT - tdt); if (e.awareT<=0) e.aware = false; }
    e.strafeT -= tdt;
    if (e.strafeT <= 0){ e.strafeT = rnd(0.5,1.5); e.strafe *= -1; }

    if (e.type==='rusher' || (e.type==='minion')){
      const sx = Math.cos(toP), sy = Math.sin(toP);
      e.vx = sx * e.speed; e.vy = sy * e.speed;
      if (dist(e, player) < e.r + player.r + 4 && player.alive && player.iframes <= 0){
        damagePlayer(1);
        for (let i=0;i<8;i++){const a=rnd(0,TAU),s=rnd(60,200);particles.push({x:e.x,y:e.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.4,max:0.4,r:2,color:'#ff5a72',kind:'spark'});}
        e.alive = false; kills++; spawnRagdoll(e);
        for (let i=0;i<14;i++){const a=rnd(0,TAU),s=rnd(60,220);debris.push({x:e.x,y:e.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,av:rnd(-8,8),rot:rnd(0,TAU),w:rnd(2,5),h:rnd(2,7),life:rnd(0.8,2.0),color:'#ff8a9a'});}
      }
    } else if (e.type==='dodger'){
      const px = -Math.sin(toP)*e.strafe, py = Math.cos(toP)*e.strafe;
      e.vx = px * e.speed + Math.cos(toP)*30;
      e.vy = py * e.speed + Math.sin(toP)*30;
      if (e.dodgeCd <= 0){
        for (const b of bullets){
          if (b.owner !== 'player') continue;
          const dx = e.x-b.x, dy = e.y-b.y;
          const bs = Math.hypot(b.vx, b.vy);
          if (bs < 1) continue;
          const tp = (dx*b.vx + dy*b.vy)/(bs*bs);
          if (tp < 0 || tp > 0.5) continue;
          const cx = b.x + b.vx*tp, cy = b.y + b.vy*tp;
          if (Math.hypot(e.x-cx, e.y-cy) < 60){
            const perp = Math.atan2(-b.vx, b.vy);
            e.vx = Math.cos(perp)*240; e.vy = Math.sin(perp)*240;
            e.dodgeCd = 1.6;
            for (let i=0;i<6;i++){const a=rnd(0,TAU),s=rnd(40,140);particles.push({x:e.x,y:e.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.3,max:0.3,r:2,color:'#ffd0d8',kind:'spark'});}
            break;
          }
        }
      }
      e.dodgeCd = Math.max(0, e.dodgeCd - tdt);
      e.fireCd -= tdt;
      if (e.fireCd <= 0 && sees){
        e.fireCd = e.fireRate + rnd(-0.2,0.3);
        const a = toP;
        fireBullet('enemy', e.x+Math.cos(a)*22, e.y+Math.sin(a)*22, Math.cos(a)*460, Math.sin(a)*460);
        Snd.enemyShoot();
      }
    } else if (e.type==='tactician'){
      // Hide behind cover, peek and burst-fire
      e.coverFindT -= tdt;
      if (!e.coverTarget || e.coverFindT <= 0){
        e.coverTarget = findCoverPos(e, player, 360) || {x:e.x + rnd(-80,80), y:e.y + rnd(-80,80)};
        e.coverFindT = rnd(2.5, 4.0);
        e.atCover = false;
      }
      const dCov = Math.hypot(e.coverTarget.x - e.x, e.coverTarget.y - e.y);
      if (dCov > 20){
        const ca = Math.atan2(e.coverTarget.y - e.y, e.coverTarget.x - e.x);
        e.vx = Math.cos(ca)*e.speed; e.vy = Math.sin(ca)*e.speed;
        e.atCover = false; e.peekT = rnd(1.0, 1.8);
      } else {
        // At cover — peek to shoot
        e.atCover = true; e.vx *= 0.4; e.vy *= 0.4;
        e.peekT -= tdt;
        if (e.peekT <= 0 && sees && e.burstShots <= 0){
          e.burstShots = 3; e.burstCd = 0;
        }
        if (e.burstShots > 0){
          e.burstCd -= tdt;
          if (e.burstCd <= 0){
            const a = toP + rnd(-0.04,0.04);
            fireBullet('enemy', e.x+Math.cos(a)*22, e.y+Math.sin(a)*22, Math.cos(a)*500, Math.sin(a)*500);
            Snd.enemyShoot();
            e.burstShots--; e.burstCd = 0.12;
            if (e.burstShots <= 0){ e.peekT = rnd(1.4, 2.4); e.coverFindT = Math.min(e.coverFindT, 1.5); }
          }
        }
      }
    } else if (e.type==='sniper'){
      // Holds position, charges red laser sight, fires fast piercing shot
      const d = dist(e, player);
      const desired = 460;
      if (Math.abs(d - desired) > 60 && !e.charging){
        const r = (d - desired)*0.4;
        e.vx = Math.cos(toP)*r; e.vy = Math.sin(toP)*r;
      } else { e.vx *= 0.85; e.vy *= 0.85; }
      e.fireCd -= tdt;
      if (!e.charging && e.fireCd <= 0 && sees){
        e.charging = true; e.chargeT = 1.1;
        e.lockX = player.x; e.lockY = player.y; // initial aim
      }
      if (e.charging){
        // Track player but slowly
        e.lockX = lerp(e.lockX, player.x, Math.min(1, tdt*1.6));
        e.lockY = lerp(e.lockY, player.y, Math.min(1, tdt*1.6));
        e.chargeT -= tdt;
        if (e.chargeT <= 0){
          const a = Math.atan2(e.lockY - e.y, e.lockX - e.x);
          fireBullet('enemy', e.x+Math.cos(a)*22, e.y+Math.sin(a)*22, Math.cos(a)*900, Math.sin(a)*900, {pierce:1, r:5, big:true});
          tone(1700,0.12,'sawtooth',0.10); noise(0.08,0.08,3500);
          shake = Math.max(shake, 0.18);
          e.charging = false; e.fireCd = e.fireRate;
        }
      }
    } else if (e.type==='splitter'){
      // Slow approach, slight strafe
      const px = -Math.sin(toP)*e.strafe*0.6, py = Math.cos(toP)*e.strafe*0.6;
      e.vx = Math.cos(toP)*e.speed*0.7 + px*e.speed;
      e.vy = Math.sin(toP)*e.speed*0.7 + py*e.speed;
      if (dist(e, player) < e.r + player.r + 4 && player.alive && player.iframes <= 0){
        damagePlayer(1);
        e.hp = 0;
      }
    } else if (e.type==='phaser'){
      // INVERSE TIME: moves and fires more when player is still (time is slow)
      e.phase = (e.phase || 0) + dt*8;
      const inverseT = 1 - timeScale; // 0 when moving, 1 when frozen
      // Use real dt for movement, scaled by inverse-time intensity
      const phaseSpeed = e.speed * (0.4 + inverseT*2.4);
      const px = -Math.sin(toP)*e.strafe;
      e.vx = (Math.cos(toP)*0.4 + px*0.8) * phaseSpeed;
      e.vy = (Math.sin(toP)*0.4 + Math.cos(toP)*e.strafe*0.8) * phaseSpeed;
      // Phaser moves in real time, not scaled — explicit position update here, skip the tdt at end
      e.x += e.vx * dt * (0.3 + inverseT*0.7);
      e.y += e.vy * dt * (0.3 + inverseT*0.7);
      e._skipMove = true;
      // Fire bursts while player is frozen
      e.fireCd -= dt * (0.5 + inverseT*1.5);
      if (e.fireCd <= 0 && sees){
        e.fireCd = e.fireRate;
        for (let i=-1;i<=1;i++){
          const a = toP + i*0.18;
          fireBullet('enemy', e.x+Math.cos(a)*22, e.y+Math.sin(a)*22, Math.cos(a)*340, Math.sin(a)*340);
        }
        tone(660,0.08,'square',0.05); tone(440,0.10,'sine',0.04);
      }
    } else if (e.isBoss){
      updateBossEntity(e, dt, tdt, toP, sees);
    } else {
      // shooter
      const d = dist(e, player);
      const desired = 280;
      const radial = (d - desired) * 0.35;
      const tangent = e.strafe;
      e.vx = Math.cos(toP)*radial + (-Math.sin(toP))*e.speed*tangent;
      e.vy = Math.sin(toP)*radial + ( Math.cos(toP))*e.speed*tangent;
      e.fireCd -= tdt;
      if (e.fireCd <= 0 && sees){
        e.fireCd = e.fireRate + rnd(-0.3, 0.3);
        const a = toP + rnd(-0.05, 0.05);
        fireBullet('enemy', e.x+Math.cos(a)*22, e.y+Math.sin(a)*22, Math.cos(a)*460, Math.sin(a)*460);
        Snd.enemyShoot();
      }
    }

    if (!e._skipMove){
      e.x += e.vx * tdt;
      e.y += e.vy * tdt;
    }
    e._skipMove = false;
    // Wall clamp (phaser still collides — uses corrected position)
    for (const w of walls){ const p = pushOut(e.x,e.y,e.r,w.x,w.y,w.w,w.h); if (p){ e.x=p.x; e.y=p.y; } }
    for (const g of glassWalls){ if (g.hp<=0) continue; const p = pushOut(e.x,e.y,e.r,g.x,g.y,g.w,g.h); if (p){ e.x=p.x; e.y=p.y; } }
  }

  // ---------- Bullets ----------
  for (let i=bullets.length-1;i>=0;i--){
    const b = bullets[i];
    b.life -= tdt; if (b.life <= 0){ bullets.splice(i,1); continue; }
    // Trail
    b.trail.push({x:b.x,y:b.y,t:performance.now()});
    if (b.trail.length > 14) b.trail.shift();

    const nx = b.x + b.vx*tdt;
    const ny = b.y + b.vy*tdt;

    // Wall hit
    let hitWall = null;
    for (const w of walls){
      const h = segHitsRect(b.x,b.y,nx,ny,w.x,w.y,w.w,w.h);
      if (h && (!hitWall || h.t < hitWall.t)){ hitWall = h; hitWall.wall = w; }
    }
    // Glass hit
    let hitGlass = null;
    for (const g of glassWalls){
      if (g.hp <= 0) continue;
      const h = segHitsRect(b.x,b.y,nx,ny,g.x,g.y,g.w,g.h);
      if (h && (!hitWall || h.t < hitWall.t) && (!hitGlass || h.t < hitGlass.t)){ hitGlass = h; hitGlass.glass = g; }
    }

    if (hitGlass && (!hitWall || hitGlass.t < hitWall.t)){
      const g = hitGlass.glass;
      g.hp--;
      Snd.glass();
      for (let k=0;k<12;k++){
        const a = rnd(0,TAU), s = rnd(40,240);
        particles.push({x:hitGlass.x,y:hitGlass.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(0.4,1.0),max:1.0,r:rnd(1.5,3),color:'#aef',kind:'shard'});
        debris.push({x:hitGlass.x,y:hitGlass.y,vx:Math.cos(a)*s*0.5,vy:Math.sin(a)*s*0.5,av:rnd(-6,6),rot:rnd(0,TAU),w:rnd(2,4),h:rnd(2,5),life:rnd(0.6,1.4),color:'#b4eaff'});
      }
      bullets.splice(i,1); continue;
    }

    if (hitWall){
      // Ricochet for player bullets
      if (b.owner==='player' && b.ricochet > 0){
        b.ricochet--;
        const ww = hitWall.wall;
        // Determine normal (rough): nearest face
        const cx = clamp(hitWall.x, ww.x, ww.x+ww.w);
        const cy = clamp(hitWall.y, ww.y, ww.y+ww.h);
        let nxN = 0, nyN = 0;
        if (Math.abs(hitWall.x - ww.x) < 0.5) nxN = -1;
        else if (Math.abs(hitWall.x - (ww.x+ww.w)) < 0.5) nxN = 1;
        else if (Math.abs(hitWall.y - ww.y) < 0.5) nyN = -1;
        else nyN = 1;
        const dot = b.vx*nxN + b.vy*nyN;
        b.vx -= 2*dot*nxN; b.vy -= 2*dot*nyN;
        b.x = hitWall.x + nxN*1.5; b.y = hitWall.y + nyN*1.5;
        for (let k=0;k<5;k++){const a=Math.atan2(b.vy,b.vx)+rnd(-0.8,0.8); particles.push({x:hitWall.x,y:hitWall.y,vx:Math.cos(a)*rnd(80,200),vy:Math.sin(a)*rnd(80,200),life:0.2,max:0.2,r:1.5,color:'#ffe',kind:'spark'});}
        tone(1800,0.04,'triangle',0.04);
        continue;
      }
      for (let k=0;k<5;k++){const a=rnd(0,TAU); particles.push({x:hitWall.x,y:hitWall.y,vx:Math.cos(a)*rnd(40,140),vy:Math.sin(a)*rnd(40,140),life:0.3,max:0.3,r:1.5,color:'#fff',kind:'spark'});}
      hitMarks.push({x:hitWall.x,y:hitWall.y,life:1.0,max:1.0,r:rnd(3,6)});
      bullets.splice(i,1); continue;
    }

    b.x = nx; b.y = ny;

    // Hit enemies
    let hitSomething = false;
    if (b.owner==='player'){
      // Warden nodes: bullets hit nodes before body
      for (const e of enemies){
        if (!e.alive || !e.isBoss || e.bossType!=='warden' || !e.shielded) continue;
        for (const n of e.nodes){
          if (!n.alive) continue;
          const nx2 = e.x + Math.cos(n.angle)*n.dist, ny2 = e.y + Math.sin(n.angle)*n.dist;
          if (Math.hypot(b.x - nx2, b.y - ny2) < n.r + b.r){
            n.hp--; n.flashT = 0.15;
            if (n.hp <= 0){
              n.alive = false; Snd.glass(); shake = Math.max(shake, 0.18);
              for (let k=0;k<18;k++){const a=rnd(0,TAU),s=rnd(80,280);particles.push({x:nx2,y:ny2,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(0.4,0.9),max:0.9,r:rnd(2,4),color:'#ffae3a',kind:'spark'});}
              for (let k=0;k<10;k++){const a=rnd(0,TAU),s=rnd(60,260);debris.push({x:nx2,y:ny2,vx:Math.cos(a)*s,vy:Math.sin(a)*s,av:rnd(-6,6),rot:rnd(0,TAU),w:rnd(2,4),h:rnd(2,5),life:rnd(0.6,1.2),color:'#ffae3a'});}
            } else { Snd.hit(); for (let k=0;k<6;k++){const a=rnd(0,TAU);particles.push({x:nx2,y:ny2,vx:Math.cos(a)*rnd(40,160),vy:Math.sin(a)*rnd(40,160),life:0.3,max:0.3,r:2,color:'#ffd28a',kind:'spark'});}}
            hitSomething = true; break;
          }
        }
        if (hitSomething) break;
      }
      // Enemy body
      if (!hitSomething){
        for (const e of enemies){
          if (!e.alive) continue;
          // Warden body is shielded while nodes alive
          if (e.isBoss && e.bossType==='warden' && e.shielded){
            if (Math.hypot(e.x-b.x, e.y-b.y) < e.r + b.r){
              // Shield deflect feedback
              for (let k=0;k<6;k++){const a=rnd(0,TAU);particles.push({x:b.x,y:b.y,vx:Math.cos(a)*rnd(40,160),vy:Math.sin(a)*rnd(40,160),life:0.25,max:0.25,r:1.5,color:'#ffae3a',kind:'spark'});}
              tone(620,0.05,'square',0.05); hitSomething = true; break;
            }
            continue;
          }
          if (Math.hypot(e.x-b.x, e.y-b.y) < e.r + b.r){
            damageEnemy(e); hitSomething = true; break;
          }
        }
      }
      // Hit props
      if (!hitSomething){
        for (const pr of props){
          if (pr.broken) continue;
          if (Math.hypot(pr.x-b.x, pr.y-b.y) < pr.r + b.r){
            pr.broken = true;
            shockwaves.push({x:pr.x,y:pr.y,r:10,maxR:160,life:0,maxLife:0.6,hit:false,small:true});
            for (let k=0;k<26;k++){const a=rnd(0,TAU),s=rnd(80,360);particles.push({x:pr.x,y:pr.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(0.3,0.8),max:0.8,r:rnd(2,4),color:'#ffae3a',kind:'spark'});}
            for (let k=0;k<10;k++){const a=rnd(0,TAU),s=rnd(60,260);debris.push({x:pr.x,y:pr.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,av:rnd(-6,6),rot:rnd(0,TAU),w:rnd(3,6),h:rnd(3,8),life:rnd(0.8,1.6),color:'#caa570'});}
            tone(80,0.3,'sawtooth',0.18); noise(0.2,0.16,1200);
            shake = Math.max(shake, 0.4);
            for (const en of enemies){ if (!en.alive) continue; if (Math.hypot(en.x-pr.x, en.y-pr.y) < 140){ damageEnemy(en); en.vx += (en.x-pr.x)*4; en.vy += (en.y-pr.y)*4; }}
            hitSomething = true; break;
          }
        }
      }
    } else {
      if (player.alive && player.iframes <= 0 && Math.hypot(player.x-b.x, player.y-b.y) < player.r + b.r){
        damagePlayer(1); hitSomething = true;
      }
    }
    if (hitSomething){ bullets.splice(i,1); continue; }

    // World bounds
    if (b.x < -50 || b.x > ARENA.w+50 || b.y < -50 || b.y > ARENA.h+50) bullets.splice(i,1);
  }

  // ---------- Shockwaves ----------
  for (let i=shockwaves.length-1;i>=0;i--){
    const s = shockwaves[i];
    s.life += tdt;
    s.r = lerp(s.maxR*0.05, s.maxR, s.life/s.maxLife);
    // Player damage at shock front
    if (!s.hit && !s.small && player.alive && player.iframes <= 0){
      const d = Math.hypot(player.x-s.x, player.y-s.y);
      if (Math.abs(d - s.r) < 24){ damagePlayer(1); s.hit = true; }
    }
    if (s.life >= s.maxLife) shockwaves.splice(i,1);
  }

  // ---------- Particles ----------
  for (let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.life -= tdt;
    if (p.life <= 0){ particles.splice(i,1); continue; }
    p.x += (p.vx||0) * tdt;
    p.y += (p.vy||0) * tdt;
    if (p.vx) p.vx *= (1 - tdt*1.5);
    if (p.vy) p.vy *= (1 - tdt*1.5);
  }

  // ---------- Debris ----------
  for (let i=debris.length-1;i>=0;i--){
    const d = debris[i];
    d.life -= tdt; if (d.life <= 0){ debris.splice(i,1); continue; }
    d.x += d.vx*tdt; d.y += d.vy*tdt;
    d.vx *= (1-tdt*2); d.vy *= (1-tdt*2);
    d.rot += d.av*tdt;
  }

  // ---------- Ragdolls ----------
  for (let i=ragdolls.length-1;i>=0;i--){
    const r = ragdolls[i];
    r.life -= tdt; if (r.life <= 0){ ragdolls.splice(i,1); continue; }
    for (const s of r.segs){
      s.x += s.vx * tdt; s.y += s.vy * tdt;
      s.vx *= (1 - tdt*2.0); s.vy *= (1 - tdt*2.0);
      // Bounce off walls
      for (const w of walls){ const p=pushOut(s.x,s.y,s.r,w.x,w.y,w.w,w.h); if (p){ s.x=p.x; s.y=p.y; s.vx*=-.4; s.vy*=-.4; } }
    }
  }

  // ---------- Props ----------
  for (const pr of props){
    if (pr.broken) continue;
    pr.x += pr.vx * tdt; pr.y += pr.vy * tdt;
    pr.vx *= (1-tdt*2); pr.vy *= (1-tdt*2);
    for (const w of walls){ const p=pushOut(pr.x,pr.y,pr.r,w.x,w.y,w.w,w.h); if (p){ pr.x=p.x; pr.y=p.y; pr.vx*=-.5; pr.vy*=-.5; } }
  }

  // ---------- Hit marks ----------
  for (let i=hitMarks.length-1;i>=0;i--){
    hitMarks[i].life -= dt; if (hitMarks[i].life <= 0) hitMarks.splice(i,1);
  }

  // ---------- Wave clear ----------
  const alive = enemies.filter(e=>e.alive).length;
  if (alive === 0 && STATE === 'playing'){
    STATE = 'between';
    setTimeout(()=>{
      if (wave+1 >= WAVES.length){ STATE='victory'; showCenter('VICTORY','TIME IS YOURS',''); }
      else { startWave(wave+1); STATE='playing'; }
    }, 1100);
  }

  // R to restart
  if (keys.KeyR){
    keys.KeyR = false;
    startGame();
  }

  mouseFired = false;
}

function releaseEcho(){
  // Take a snippet of last 1.5s, replay as echo clone
  const snip = recordBuffer.slice(-90).map((f,i,arr)=>({
    relT: (f.t - arr[0].t)/1000,
    x: f.x, y: f.y, angle: f.angle,
    shoot: f.shooting
  }));
  if (snip.length < 6) return;
  echoes.push({frames:snip, idx:0, t:0, life:snip[snip.length-1].relT + 0.4, x:snip[0].x, y:snip[0].y, angle:snip[0].angle, firedAt:{}});
  Snd.echo();
  flashAlpha = Math.max(flashAlpha, 0.15);
  freezeAlpha = Math.max(freezeAlpha, 0.2);
  shake = Math.max(shake, 0.18);
  for (let i=0;i<20;i++){const a=rnd(0,TAU),s=rnd(40,180);particles.push({x:player.x,y:player.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.5,max:0.5,r:2,color:'#a4ffea',kind:'echo'});}
}

/* ============================ RENDER ======================================== */
function clearBG(){
  ctx.fillStyle = PALETTE.bg0;
  ctx.fillRect(0,0,cv.width,cv.height);
}

function withCam(fn){
  ctx.save();
  ctx.translate(cv.width/2, cv.height/2);
  ctx.scale(camZoom, camZoom);
  ctx.translate(-camX + shakeX, -camY + shakeY);
  fn();
  ctx.restore();
}

function drawGrid(){
  const step = 80;
  const x0 = camX - cv.width/(2*camZoom) - step;
  const y0 = camY - cv.height/(2*camZoom) - step;
  const x1 = camX + cv.width/(2*camZoom) + step;
  const y1 = camY + cv.height/(2*camZoom) + step;
  ctx.lineWidth = 1;
  ctx.strokeStyle = PALETTE.grid;
  ctx.beginPath();
  for (let x = Math.floor(x0/step)*step; x < x1; x += step){ ctx.moveTo(x, y0); ctx.lineTo(x, y1); }
  for (let y = Math.floor(y0/step)*step; y < y1; y += step){ ctx.moveTo(x0, y); ctx.lineTo(x1, y); }
  ctx.stroke();
  // Bigger grid every 5 lines
  ctx.strokeStyle = PALETTE.gridStrong;
  ctx.beginPath();
  for (let x = Math.floor(x0/(step*5))*step*5; x < x1; x += step*5){ ctx.moveTo(x, y0); ctx.lineTo(x, y1); }
  for (let y = Math.floor(y0/(step*5))*step*5; y < y1; y += step*5){ ctx.moveTo(x0, y); ctx.lineTo(x1, y); }
  ctx.stroke();
}

function drawWalls(){
  // Subtle floor tinting + neon-edged walls
  for (const w of walls){
    ctx.fillStyle = '#0d1322';
    ctx.fillRect(w.x, w.y, w.w, w.h);
    ctx.lineWidth = 1.4;
    ctx.strokeStyle = 'rgba(120,200,255,0.55)';
    ctx.strokeRect(w.x+0.5, w.y+0.5, w.w-1, w.h-1);
    // Glow
    ctx.shadowColor = 'rgba(100,200,255,0.55)';
    ctx.shadowBlur = 12;
    ctx.strokeRect(w.x+0.5, w.y+0.5, w.w-1, w.h-1);
    ctx.shadowBlur = 0;
  }
  // Glass
  for (const g of glassWalls){
    if (g.hp <= 0) continue;
    const a = g.hp/g.max;
    ctx.fillStyle = `rgba(170,235,255,${0.10*a + 0.05})`;
    ctx.fillRect(g.x, g.y, g.w, g.h);
    ctx.strokeStyle = `rgba(170,235,255,${0.5*a + 0.2})`;
    ctx.lineWidth = 1.2;
    ctx.strokeRect(g.x+0.5, g.y+0.5, g.w-1, g.h-1);
    // Cracks
    if (a < 1){
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      for (let i=0;i<6;i++){
        const sx = g.x + rnd(0,g.w), sy = g.y + rnd(0,g.h);
        ctx.moveTo(sx, sy); ctx.lineTo(sx + rnd(-20,20), sy + rnd(-20,20));
      }
      ctx.stroke();
    }
  }
  // Props
  for (const pr of props){
    if (pr.broken){
      ctx.fillStyle = 'rgba(60,30,15,0.5)';
      ctx.beginPath(); ctx.arc(pr.x,pr.y,pr.r*0.6,0,TAU); ctx.fill();
      continue;
    }
    // Barrel
    ctx.fillStyle = '#5a3d22';
    ctx.beginPath(); ctx.arc(pr.x, pr.y, pr.r, 0, TAU); ctx.fill();
    ctx.strokeStyle = '#ffae3a';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,174,58,0.6)';
    ctx.beginPath(); ctx.arc(pr.x, pr.y, pr.r*0.4, 0, TAU); ctx.fill();
  }
}

function drawHitMarks(){
  for (const m of hitMarks){
    const a = m.life/m.max;
    ctx.strokeStyle = `rgba(255,255,255,${0.5*a})`;
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(m.x, m.y, m.r*(1.5-a), 0, TAU); ctx.stroke();
  }
}

function drawShockwaves(){
  for (const s of shockwaves){
    const a = 1 - s.life/s.maxLife;
    ctx.lineWidth = 3 + (1-a)*8;
    ctx.strokeStyle = s.small ? `rgba(255,170,60,${a})` : `rgba(120,200,255,${a*0.9})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, TAU); ctx.stroke();
    ctx.lineWidth = 1.2;
    ctx.strokeStyle = `rgba(255,255,255,${a*0.6})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, TAU); ctx.stroke();
  }
}

function drawDebris(){
  for (const d of debris){
    ctx.save();
    ctx.translate(d.x, d.y); ctx.rotate(d.rot);
    ctx.fillStyle = d.color;
    ctx.globalAlpha = clamp(d.life, 0, 1);
    ctx.fillRect(-d.w/2, -d.h/2, d.w, d.h);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function drawRagdolls(){
  for (const r of ragdolls){
    const a = clamp(r.life/3, 0, 1);
    ctx.globalAlpha = a;
    ctx.strokeStyle = '#ff7a8e';
    ctx.lineWidth = 4;
    ctx.beginPath();
    for (let i=0;i<r.segs.length;i++){
      const s = r.segs[i];
      if (i===0) ctx.moveTo(s.x, s.y); else ctx.lineTo(s.x, s.y);
    }
    ctx.stroke();
    for (const s of r.segs){
      ctx.fillStyle = '#7a1d2c';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, TAU); ctx.fill();
      ctx.strokeStyle = '#ff7a8e';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
}

function drawBulletPrediction(){
  // Subtle prediction trails for enemy bullets when time is slow — helps with "see the angles"
  if (timeScale > 0.4) return;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const b of bullets){
    if (b.owner !== 'enemy') continue;
    const speed = Math.hypot(b.vx, b.vy);
    if (speed < 1) continue;
    let x = b.x, y = b.y, vx = b.vx, vy = b.vy, life = b.life;
    const step = 0.04;
    ctx.beginPath();
    ctx.moveTo(x,y);
    for (let i=0;i<40 && life>0;i++){
      const nx = x + vx*step, ny = y + vy*step;
      // Stop at walls
      let hit=null;
      for (const w of walls){ const h = segHitsRect(x,y,nx,ny,w.x,w.y,w.w,w.h); if (h && (!hit || h.t<hit.t)) hit = h; }
      if (hit){ ctx.lineTo(hit.x, hit.y); break; }
      x = nx; y = ny; life -= step;
      ctx.lineTo(x,y);
    }
    ctx.strokeStyle = `rgba(255,120,140,${0.25*(1-timeScale)})`;
    ctx.lineWidth = 1;
    ctx.setLineDash([3,4]);
    ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.restore();
}

function drawBullets(){
  // Trails first
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const b of bullets){
    if (b.trail.length < 2) continue;
    const c = b.owner==='player' ? '255,247,198' : '255,122,144';
    for (let i=1;i<b.trail.length;i++){
      const t = i/b.trail.length;
      ctx.strokeStyle = `rgba(${c},${0.6*t})`;
      ctx.lineWidth = 1 + t*3;
      ctx.beginPath();
      ctx.moveTo(b.trail[i-1].x, b.trail[i-1].y);
      ctx.lineTo(b.trail[i].x, b.trail[i].y);
      ctx.stroke();
    }
  }
  // Heads
  for (const b of bullets){
    const c = b.owner==='player' ? '#fff7c6' : '#ff7a90';
    ctx.fillStyle = c;
    ctx.shadowColor = c; ctx.shadowBlur = 16;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, TAU); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r*0.5, 0, TAU); ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.restore();
}

function drawEnemy(e){
  const flash = e.hurt > 0;
  ctx.save();
  ctx.translate(e.x, e.y);
  const baseR = e.r;

  // Per-type color palette
  let glow = '#ff3c5a', fill = '#3a0f1a', stroke = '#ff3c5a', core = '#ffd0d8';
  if (e.isBoss){ fill = '#5a0e22'; stroke = '#ff5a78'; glow = '#ff3c5a'; core = '#ffd0d8'; }
  if (e.type==='rusher' || e.type==='minion'){ glow='#ffaa3a'; stroke='#ffaa3a'; fill='#3a1f0a'; core='#ffd070'; }
  else if (e.type==='dodger'){ glow='#ff7adb'; stroke='#ff7adb'; fill='#2a0f24'; core='#ffd0f4'; }
  else if (e.type==='tactician'){ glow='#5dff9b'; stroke='#5dff9b'; fill='#0a2218'; core='#caffd8'; }
  else if (e.type==='sniper'){ glow='#ff3838'; stroke='#ff5050'; fill='#2a0808'; core='#ffd0d0'; }
  else if (e.type==='splitter'){ glow='#ffa030'; stroke='#ffa030'; fill='#2a1808'; core='#ffd28a'; }
  else if (e.type==='phaser'){ glow='#9b7aff'; stroke='#c8b4ff'; fill='#1a1030'; core='#e0d4ff'; }

  // Phantom (vulnerable = visible solid, else translucent/flickering)
  if (e.isBoss && e.bossType==='phantom' && !e.vulnerable){
    const flicker = 0.25 + 0.25*Math.sin(performance.now()*0.012);
    ctx.globalAlpha = flicker;
    glow = '#c45dff'; stroke = '#c45dff'; fill = '#2a0a44';
  } else if (e.isBoss && e.bossType==='phantom'){
    glow = '#ff4cff'; stroke = '#ff4cff';
  }

  // Body
  ctx.fillStyle = flash ? '#fff' : fill;
  ctx.strokeStyle = flash ? '#fff' : stroke;
  ctx.lineWidth = e.isBoss ? 2.8 : 1.6;
  ctx.shadowColor = glow;
  ctx.shadowBlur = e.isBoss ? 30 : 14;

  if (e.type==='splitter' && e.generation === 0){
    // Diamond shape for splitter
    ctx.beginPath();
    ctx.moveTo(0,-baseR); ctx.lineTo(baseR,0); ctx.lineTo(0,baseR); ctx.lineTo(-baseR,0); ctx.closePath();
    ctx.fill(); ctx.stroke();
  } else if (e.type==='tactician'){
    // Hex shape
    ctx.beginPath();
    for (let i=0;i<6;i++){ const a=i*Math.PI/3; const x=Math.cos(a)*baseR, y=Math.sin(a)*baseR; if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);} ctx.closePath();
    ctx.fill(); ctx.stroke();
  } else if (e.type==='sniper'){
    // Triangle
    ctx.rotate(e.angle);
    ctx.beginPath();
    ctx.moveTo(baseR*1.3, 0); ctx.lineTo(-baseR*0.7, baseR*0.8); ctx.lineTo(-baseR*0.7, -baseR*0.8); ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.rotate(-e.angle);
  } else if (e.isBoss && e.bossType==='omega'){
    // Star/cross shape for omega
    ctx.beginPath();
    for (let i=0;i<8;i++){
      const a = i*Math.PI/4 + e.angle*0.3;
      const r = i%2===0 ? baseR : baseR*0.55;
      const x = Math.cos(a)*r, y = Math.sin(a)*r;
      if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.arc(0,0,baseR,0,TAU); ctx.fill(); ctx.stroke();
  }
  ctx.shadowBlur = 0;

  // Core
  ctx.fillStyle = flash ? '#fff' : core;
  ctx.beginPath(); ctx.arc(0,0,baseR*0.35,0,TAU); ctx.fill();

  // Direction indicator
  if (e.type !== 'sniper' && !(e.isBoss && e.bossType==='omega')){
    ctx.rotate(e.angle);
    ctx.strokeStyle = flash ? '#fff' : stroke;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(baseR*0.4, 0); ctx.lineTo(baseR*1.5, 0); ctx.stroke();
    ctx.rotate(-e.angle);
  }

  // Phaser pulse rings
  if (e.type==='phaser'){
    const inv = 1 - timeScale;
    if (inv > 0.1){
      ctx.strokeStyle = `rgba(200,180,255,${0.5*inv})`;
      ctx.lineWidth = 1.5;
      const t = (e.phase||0);
      for (let i=0;i<2;i++){
        const r = baseR + 6 + ((t + i*8) % 20);
        ctx.globalAlpha = (1 - r/40) * inv;
        ctx.beginPath(); ctx.arc(0,0,r,0,TAU); ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }
  }

  // Boss HP ring
  if (e.isBoss){
    ctx.lineWidth = 3;
    ctx.strokeStyle = 'rgba(255,0,40,0.25)';
    ctx.beginPath(); ctx.arc(0,0, baseR+12, -Math.PI/2, -Math.PI/2 + TAU); ctx.stroke();
    const hpA = e.hp/e.maxHp;
    ctx.strokeStyle = e.bossType==='chronarch' ? '#b070ff' : e.bossType==='phantom' ? '#ff4cff' : e.bossType==='omega' ? '#ffae3a' : '#ff5a78';
    ctx.beginPath(); ctx.arc(0,0, baseR+12, -Math.PI/2, -Math.PI/2 + TAU*hpA); ctx.stroke();
    // Phase markers
    ctx.lineWidth = 1;
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    for (let i=1;i<e.maxPhase;i++){
      const a = -Math.PI/2 + TAU*(i/e.maxPhase);
      ctx.beginPath(); ctx.moveTo(Math.cos(a)*(baseR+8), Math.sin(a)*(baseR+8)); ctx.lineTo(Math.cos(a)*(baseR+16), Math.sin(a)*(baseR+16)); ctx.stroke();
    }
  }

  ctx.globalAlpha = 1;
  ctx.restore();

  // Sniper laser sight
  if (e.type==='sniper' && e.charging){
    const a = Math.atan2(e.lockY - e.y, e.lockX - e.x);
    const charge = 1 - e.chargeT/1.1;
    ctx.save();
    ctx.strokeStyle = `rgba(255,60,60,${0.25 + 0.6*charge})`;
    ctx.lineWidth = 1 + 1.5*charge;
    ctx.setLineDash([4, 6]);
    ctx.beginPath(); ctx.moveTo(e.x, e.y);
    // Stop at first wall
    const endX = e.x + Math.cos(a)*1200, endY = e.y + Math.sin(a)*1200;
    let hit = null;
    for (const w of walls){ const h = segHitsRect(e.x,e.y,endX,endY,w.x,w.y,w.w,w.h); if (h && (!hit || h.t<hit.t)) hit = h; }
    ctx.lineTo(hit?hit.x:endX, hit?hit.y:endY);
    ctx.stroke();
    ctx.setLineDash([]);
    if (charge > 0.6){
      // Dot at target
      ctx.fillStyle = `rgba(255,80,80,${charge})`;
      ctx.shadowColor='#ff4040'; ctx.shadowBlur = 18;
      ctx.beginPath(); ctx.arc(e.lockX, e.lockY, 4 + 4*charge, 0, TAU); ctx.fill();
      ctx.shadowBlur = 0;
    }
    ctx.restore();
  }

  // Chronarch laser
  if (e.isBoss && e.bossType==='chronarch' && e.laserActive){
    ctx.save();
    const a = e.laserAngle;
    const ex = e.x + Math.cos(a)*900, ey = e.y + Math.sin(a)*900;
    ctx.strokeStyle = 'rgba(176,112,255,0.18)';
    ctx.lineWidth = 28;
    ctx.beginPath(); ctx.moveTo(e.x,e.y); ctx.lineTo(ex,ey); ctx.stroke();
    ctx.strokeStyle = 'rgba(220,180,255,0.7)';
    ctx.lineWidth = 5;
    ctx.shadowColor = '#b070ff'; ctx.shadowBlur = 22;
    ctx.beginPath(); ctx.moveTo(e.x,e.y); ctx.lineTo(ex,ey); ctx.stroke();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(e.x,e.y); ctx.lineTo(ex,ey); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Omega dual lasers
  if (e.isBoss && e.bossType==='omega' && e.omegaLaserActive){
    ctx.save();
    for (let off=0; off<2; off++){
      const a = e.omegaLaserAngle + off*Math.PI;
      const ex = e.x + Math.cos(a)*1000, ey = e.y + Math.sin(a)*1000;
      ctx.strokeStyle = 'rgba(255,170,60,0.20)';
      ctx.lineWidth = 28;
      ctx.beginPath(); ctx.moveTo(e.x,e.y); ctx.lineTo(ex,ey); ctx.stroke();
      ctx.strokeStyle = 'rgba(255,210,120,0.75)';
      ctx.lineWidth = 5;
      ctx.shadowColor = '#ffae3a'; ctx.shadowBlur = 22;
      ctx.beginPath(); ctx.moveTo(e.x,e.y); ctx.lineTo(ex,ey); ctx.stroke();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(e.x,e.y); ctx.lineTo(ex,ey); ctx.stroke();
    }
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Warden orbiting nodes
  if (e.isBoss && e.bossType==='warden'){
    for (const n of e.nodes){
      if (!n.alive) continue;
      const nx = e.x + Math.cos(n.angle)*n.dist, ny = e.y + Math.sin(n.angle)*n.dist;
      ctx.save();
      ctx.translate(nx, ny);
      const nflash = n.flashT > 0;
      ctx.fillStyle = nflash ? '#fff' : '#3a1c08';
      ctx.strokeStyle = nflash ? '#fff' : '#ffae3a';
      ctx.lineWidth = 2;
      ctx.shadowColor = '#ffae3a'; ctx.shadowBlur = 18;
      ctx.beginPath(); ctx.arc(0,0,n.r,0,TAU); ctx.fill(); ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ffd28a';
      ctx.beginPath(); ctx.arc(0,0,n.r*0.4,0,TAU); ctx.fill();
      ctx.restore();
      // Tether
      ctx.strokeStyle = 'rgba(255,170,60,0.30)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3,4]);
      ctx.beginPath(); ctx.moveTo(e.x,e.y); ctx.lineTo(nx,ny); ctx.stroke();
      ctx.setLineDash([]);
    }
    // Shield bubble
    if (e.shielded){
      ctx.strokeStyle = `rgba(255,170,60,${0.25 + 0.15*Math.sin(performance.now()*0.005)})`;
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6,6]);
      ctx.beginPath(); ctx.arc(e.x,e.y, e.r + 18, 0, TAU); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Phantom decoys
  if (e.isBoss && e.bossType==='phantom'){
    for (const d of e.decoys){
      const a = clamp(d.life/2, 0, 1);
      ctx.save();
      ctx.globalAlpha = 0.35 * a;
      ctx.translate(d.x, d.y);
      ctx.fillStyle = '#5a1278';
      ctx.strokeStyle = '#c45dff';
      ctx.lineWidth = 2;
      ctx.shadowColor = '#c45dff'; ctx.shadowBlur = 16;
      ctx.beginPath(); ctx.arc(0,0,e.r,0,TAU); ctx.fill(); ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.restore();
      ctx.globalAlpha = 1;
    }
  }

  // Awareness indicator (eye)
  if (e.aware && !e.isBoss){
    ctx.fillStyle = `rgba(255,80,100,${0.6 + 0.4*Math.sin(performance.now()*0.012)})`;
    ctx.beginPath(); ctx.arc(e.x, e.y - e.r - 8, 2.5, 0, TAU); ctx.fill();
  }
}

function drawPlayer(){
  if (!player.alive) return;
  ctx.save();
  ctx.translate(player.x, player.y);
  // Dash glow halo when iframes active
  if (player.iframes > 0){
    ctx.globalAlpha = clamp(player.iframes, 0, 0.6);
    ctx.fillStyle = '#9fe6ff';
    ctx.beginPath(); ctx.arc(0,0,player.r*1.8,0,TAU); ctx.fill();
    ctx.globalAlpha = 1;
  }
  // Damage flash tint
  const hurtA = damageFlash > 0 ? 1 : 0;
  ctx.fillStyle = hurtA ? '#ffd0d8' : '#0b2632';
  ctx.strokeStyle = hurtA ? '#fff' : '#9fe6ff';
  ctx.lineWidth = 1.8;
  ctx.shadowColor = '#6df'; ctx.shadowBlur = 18;
  ctx.beginPath(); ctx.arc(0,0,player.r,0,TAU); ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(0,0,player.r*0.36,0,TAU); ctx.fill();

  // Gun
  ctx.rotate(player.angle);
  ctx.fillStyle = '#dfeaff';
  ctx.fillRect(player.r*0.4, -2.5, player.r*1.4, 5);
  ctx.fillStyle = '#6df';
  ctx.fillRect(player.r*0.4 + player.r*1.1, -1.5, 4, 3);

  // Aim ray (light "laser sight")
  ctx.strokeStyle = 'rgba(100,210,255,0.20)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(player.r*1.8, 0); ctx.lineTo(900, 0); ctx.stroke();
  ctx.restore();

  // Dash cooldown ring
  if (player.dashCd > 0){
    const p = 1 - player.dashCd/1.0;
    ctx.strokeStyle = 'rgba(100,210,255,0.35)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(player.x, player.y, player.r+8, -Math.PI/2, -Math.PI/2 + TAU*p); ctx.stroke();
  }
}

function drawEchoes(){
  for (const ec of echoes){
    ctx.save();
    ctx.globalAlpha = 0.45;
    ctx.fillStyle = '#a4ffea';
    ctx.strokeStyle = '#a4ffea';
    ctx.shadowColor = '#a4ffea'; ctx.shadowBlur = 20;
    ctx.beginPath(); ctx.arc(ec.x, ec.y, player.r, 0, TAU); ctx.fill();
    ctx.translate(ec.x, ec.y); ctx.rotate(ec.angle);
    ctx.fillRect(player.r*0.4, -2, player.r*1.3, 4);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

function drawParticles(){
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const p of particles){
    const a = clamp(p.life/p.max, 0, 1);
    if (p.kind==='flash'){
      ctx.fillStyle = `rgba(255,247,198,${0.4*a})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r*(2-a), 0, TAU); ctx.fill();
      continue;
    }
    if (p.kind==='ghost'){
      ctx.fillStyle = `rgba(159,230,255,${0.18*a})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, TAU); ctx.fill();
      continue;
    }
    const c = p.color || '#fff';
    ctx.fillStyle = c;
    ctx.globalAlpha = a;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, TAU); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawArenaEdge(){
  // Subtle neon perimeter
  ctx.strokeStyle = 'rgba(100,200,255,0.10)';
  ctx.lineWidth = 1;
  ctx.strokeRect(0,0,ARENA.w,ARENA.h);
}

function drawBoundaryFog(){
  // Dim outside-bounds
  ctx.save();
  ctx.globalCompositeOperation = 'multiply';
  ctx.fillStyle = '#000';
  ctx.fillRect(-2000, -2000, 2000, 4000+ARENA.h);
  ctx.fillRect(ARENA.w, -2000, 2000, 4000+ARENA.h);
  ctx.fillRect(-2000, -2000, 4000+ARENA.w, 2000);
  ctx.fillRect(-2000, ARENA.h, 4000+ARENA.w, 2000);
  ctx.restore();
}

function render(){
  clearBG();
  withCam(()=>{
    drawGrid();
    drawArenaEdge();
    drawWalls();
    drawHitMarks();
    drawShockwaves();
    drawDebris();
    drawBulletPrediction();
    drawRagdolls();
    drawEchoes();
    for (const e of enemies) if (e.alive) drawEnemy(e);
    drawPlayer();
    drawBullets();
    drawParticles();
    drawBoundaryFog();
  });

  // Edge tint when time is slow
  const slowTint = 1 - timeScale;
  if (slowTint > 0.1){
    ctx.save();
