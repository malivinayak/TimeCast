    const g = ctx.createRadialGradient(cv.width/2, cv.height/2, Math.min(cv.width,cv.height)*0.35, cv.width/2, cv.height/2, Math.max(cv.width,cv.height)*0.7);
    g.addColorStop(0, 'rgba(0,0,0,0)');
    g.addColorStop(1, `rgba(60,140,220,${0.20*slowTint})`);
    ctx.fillStyle = g;
    ctx.fillRect(0,0,cv.width,cv.height);
    ctx.restore();
  }

  // Damage flash
  if (damageFlash > 0){
    ctx.fillStyle = `rgba(255,40,80,${0.35*damageFlash})`;
    ctx.fillRect(0,0,cv.width,cv.height);
  }

  // White flash
  if (flashAlpha > 0){
    document.getElementById('flash').style.opacity = String(flashAlpha);
  } else {
    document.getElementById('flash').style.opacity = '0';
  }
  if (freezeAlpha > 0){
    document.getElementById('freeze').style.background = `rgba(100,255,220,${freezeAlpha*0.2})`;
  } else {
    document.getElementById('freeze').style.background = 'transparent';
  }
}

/* ============================ HUD =========================================== */
function refreshHud(){
  document.getElementById('wave').textContent = String(wave+1).padStart(2,'0');
  document.getElementById('wavename').textContent = WAVES[wave] ? WAVES[wave].name : '';
  document.getElementById('ts').textContent = String(Math.round(timeScale*100)).padStart(2,'0') + '%';
  document.getElementById('tsbar').style.width = (timeScale*100).toFixed(0)+'%';
  document.getElementById('echo').textContent = echoReady ? 'ECHO · READY' : `ECHO · ${echoCooldown.toFixed(1)}s`;
  const alive = enemies ? enemies.filter(e=>e.alive).length : 0;
  document.getElementById('threats').textContent = String(alive).padStart(2,'0');
  document.getElementById('kills').textContent = 'KILLS · ' + kills;

  const hp = document.getElementById('hp');
  let hpHtml = '';
  for (let i=0;i<player.maxHp;i++) hpHtml += `<b class="${i<player.hp?'':'lost'}"></b>`;
  hp.innerHTML = hpHtml;

  const ammo = document.getElementById('ammo');
  let aHtml = '';
  for (let i=0;i<player.maxAmmo;i++){
    let cls = 'spent';
    if (player.reloading) cls = 'reloading';
    else if (i < player.ammo) cls = '';
    aHtml += `<b class="${cls}"></b>`;
  }
  ammo.innerHTML = aHtml;
}

let comboShownT = 0;
function showCombo(){
  comboShownT = 1.4;
  const el = document.getElementById('combo');
  el.querySelector('.x').textContent = '×'+combo;
  el.style.opacity = '1';
  el.style.transform = 'translateX(0)';
}
function tickCombo(dt){
  if (comboShownT > 0){
    comboShownT -= dt;
    if (comboShownT <= 0){ document.getElementById('combo').style.opacity = '0'; }
  }
}

function showCenter(name, sub, hint){
  const el = document.getElementById('centermsg');
  el.classList.remove('hidden','fadeout');
  document.getElementById('cmname').textContent = name;
  document.getElementById('cmsub').textContent = sub;
  document.getElementById('cmhint').textContent = hint;
  setTimeout(()=>{ el.classList.add('fadeout'); setTimeout(()=> el.classList.add('hidden'), 600); }, 1800);
}

/* ============================ GAME LIFECYCLE ================================ */
function startGame(){
  player = newPlayer();
  kills = 0; wave = 0; combo = 0; maxCombo = 0;
  STATE = 'playing';
  document.getElementById('menu').classList.add('hidden');
  startWave(0);
}

document.getElementById('startbtn').addEventListener('click', ()=>{
  ensureAudio();
  startGame();
});
addEventListener('keydown', e=>{
  if (e.code==='Enter' && STATE==='menu'){ ensureAudio(); startGame(); }
});

/* ============================ MAIN LOOP ===================================== */
let last = performance.now();
function loop(now){
  const dt = Math.min(0.05, (now-last)/1000);
  last = now;
  update(dt);
  tickCombo(dt);
  render();
  refreshHud();
  requestAnimationFrame(loop);
}

// Initialize world even before start so menu has a backdrop animation
player = newPlayer();
buildArena();
enemies = []; bullets = []; particles = [];
shockwaves = []; debris = []; ragdolls = []; decoys = []; hitMarks = []; recordBuffer = []; echoes = [];

requestAnimationFrame(loop);
</script>
